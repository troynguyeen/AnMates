# Redis 7 config — tuned for rate-limit + SignalR backplane workload.
# Bind only to the docker network; password is set via command-line.

bind 0.0.0.0 -::*
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 60

# Persistence: RDB snapshots (rate-limit state is acceptable to lose on crash;
# we just want a warm restart).  AOF off to keep writes cheap.
save 900 1
save 300 10
save 60 1000
appendonly no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory cap.  evict least-recently-used keys when full.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Lua: ensure rate-limit scripts can complete (default 5s is fine).
lua-time-limit 5000

# Clients
maxclients 1000

# Slow log: capture queries > 50ms.
slowlog-log-slower-than 50000
slowlog-max-len 128

# Disable dangerous commands for the application user.
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""
