h2>\n\n  <h3><span class=\"h3no\">F1·a<\u002Fspan>Mức P0 (chặn launch)<\u002Fh3>\n  <div class=\"note warn\">\n    <span class=\"lbl\">P0 · Bề mặt soạn Lá thư<\u002Fspan>\n    Luồng người nhận có (màn 18–19); luồng <strong>người gửi<\u002Fstrong> chưa có. Cần: picker đối tượng (hoặc contact từ wishlist), picker quán, lịch + giờ, chip mood, freeform note có filter PII / profanity, dòng P.S., preview \"as letter\" trước khi gửi.\n  <\u002Fdiv>\n  <div class=\"note warn\">\n    <span class=\"lbl\">P0 · Luồng báo cáo / safety<\u002Fspan>\n    \"Báo cáo\" hiện ở màn 22 nhưng form, upload bằng chứng, state hậu-report, pause tài khoản — đều chưa có. Đây là tối thiểu pháp lý / T&amp;S.\n  <\u002Fdiv>\n  <div class=\"note warn\">\n    <span class=\"lbl\">P0 · Block / unmatch<\u002Fspan>\n    Chưa thấy ở bất kỳ màn nào. Bắt buộc cho an toàn. Cần truy cập từ profile, header chat, vuốt row inbox.\n  <\u002Fdiv>\n  <div class=\"note warn\">\n    <span class=\"lbl\">P0 · Luồng huỷ<\u002Fspan>\n    Ngầm trong perk Gold \"Forgiveness · miễn 1 lần huỷ/tháng\" nhưng CTA huỷ và màn confirm chưa có. Xem J9.\n  <\u002Fdiv>\n  <div class=\"note warn\">\n    <span class=\"lbl\">P0 · Xoá tài khoản / xuất dữ liệu<\u002Fspan>\n    Tuân thủ Nghị định 13/2023 về dữ liệu cá nhân — cần luồng self-serve.\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">F1·b<\u002Fspan>Mức P1 (cần cho v1 lành mạnh)<\u002Fh3>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Trung tâm thông báo &amp; tuỳ chọn<\u002Fspan>\n    Nhiều push trigger (24h hello, T-45 selfie, T-3h, ETA, …). User chưa có cách điều chỉnh và xem lại push trong app.\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Settings (quyền, ngôn ngữ, vị trí)<\u002Fspan>\n    Tab Mình mới có profile + IAP, chưa có settings. Cần cho push, blocklist, devices.\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Profile edit<\u002Fspan>\n    Mình hiện public view; chưa có edit-mode (ảnh order, gu, vibe, intro).\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Xem profile Mate khác<\u002Fspan>\n    View full profile từ chat hoặc thẻ swipe — chưa hiện trong bộ màn.\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · \"Tạm nghỉ\"<\u002Fspan>\n    Nhu cầu thật (thi cử, du lịch, ốm). Pattern phổ biến.\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Surface đối tác quán<\u002Fspan>\n    Voucher, giữ bàn, \"còn bàn 2 chỗ\", Deal Radar — đều cần một bề mặt operator. Ngoài scope màn consumer, nhưng quyết định UX consumer.\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Hoá đơn / lịch sử thanh toán IAP<\u002Fspan>\n    \"Quản lý\" ở Mình được nhắc nhưng màn quản lý chưa có. Bắt buộc cho subscription product.\n  <\u002Fdiv>\n  <div class=\"note gap\">\n    <span class=\"lbl\">P1 · Chi tiết Trust event &amp; appeal<\u002Fspan>\n    Màn 24 hiện sổ cái nhưng tap entry chưa có view chi tiết + appeal entry.\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">F1·c<\u002Fspan>Mức P2<\u002Fh3>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Ăn nhóm (≥3 Mate). Chưa mô hình hoá. Cần semantic match + chat riêng.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Đổi số / SIM swap recovery.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Hỗ trợ đa ngôn ngữ (giọng brand đang Vietnamese-native — cần rõ positioning EN).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Referral / mời bạn (đòn bẩy lớn cho category).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Quy đổi voucher tại quán (QR? code?).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> \"Ăn miết review\" cuối năm.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Search-by-Mate (omission có chủ ý, nhưng \"đã từng ăn cùng\" finder hữu ích cho Best Mate flow).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Share Wishlist — gửi wishlist cho bạn chưa dùng ĂnMates (acquisition).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Empty state cho mọi list (no matches, no chats, no wishlist).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Loading / network-error state.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Accessibility: dynamic type, screen-reader cho Vibe meter, Trust badge an toàn cho color-blind.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Dark mode (brand có lockup inverted nên đã biết surface tồn tại).<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Lịch sử Lá thư — view bên gửi và bên nhận.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Cảnh báo chênh tuổi (≥7 năm) trên swipe — chống grooming.<\u002Fdiv>\n  <div class=\"note gap\"><span class=\"lbl\">P2<\u002Fspan> Tích hợp lịch (iOS Calendar, Google Calendar).<\u002Fdiv>\n<\u002Fsection>\n\n<!-- F2 -->\n<section id=\"f2\">\n  <h2><span class=\"secno\">F2<\u002Fspan>Bất nhất &amp; rủi ro UX<\u002Fh2>\n  <ul>\n    <li><strong>Counter onboarding lệch.<\u002Fstrong> Màn 06 ghi <em class=\"vn\">\"BƯỚC 2 / 5\"<\u002Fem>; màn 08 <em class=\"vn\">\"3/5\"<\u002Fem>; màn 09 <em class=\"vn\">\"4/5\"<\u002Fem>; màn 10 <em class=\"vn\">\"5/5\"<\u002Fem>. Face verify (07) không có chip nhưng rõ là step riêng. Hoặc gộp vào OTP về thị giác, hoặc thêm chip.<\u002Fli>\n    <li><strong>Trùng số \"09\" và \"10\".<\u002Fstrong> \"09 _ Gu ẩm thực\" và \"09 _ Khám phá / Home\" cùng đánh số 09; tương tự với 10. Ngầm chỉ chức năng kép (sau signup = gu; logged-in = home). Cần document rõ cho engineering — dễ off-by-one.<\u002Fli>\n    <li><strong>Wishlist gom ba khái niệm<\u002Fstrong> (saved quán, kèo đã đi, kho ảnh). Tách hai sub-tab.<\u002Fli>\n    <li><strong>Vibe meter đơn vị mơ hồ.<\u002Fstrong> Màn 15 ghi \"/100\" nhưng không có số; màn 16 ghi \"UNLOCKED\" cũng không có số. Chọn một dạng (số hoặc nhãn) làm primary, thứ kia là secondary.<\u002Fli>\n    <li><strong>Ngưỡng Trust không nhất quán.<\u002Fstrong> Màn 24 cắt ≥90 (Perfect) và &lt;80 (limited). Ultimate Golden Pool yêu cầu ≥95 (màn 25/28). Ba ngưỡng cho ba hành vi — ổn, nhưng dashboard cần label cả ba.<\u002Fli>\n    <li><strong>Ba đường mời.<\u002Fstrong> Chi tiết quán (11) có \"Tìm Mate\"; chat inbox (14) có \"Rủ đi\" cho Best Mate; Lá thư bypass tất cả. Ba pathway có semantics khác nhau — cần làm rõ mental model (\"3 cách rủ đi: quẹt · lá thư · best mate\").<\u002Fli>\n    <li><strong>Logic voucher trải nhiều màn<\u002Fstrong> (màn 17 voucher 50k; màn 25 cashback 100k) — hai cơ chế khác nhau; copy phải phân biệt rạch ròi \"voucher cho buổi ăn\" vs \"cashback gói VVIP\".<\u002Fli>\n    <li><strong>\"Quẹt phải để gửi lời mời đi ăn cùng — không phải hẹn hò\"<\u002Fstrong> ở màn 03 là kỷ luật brand rất tốt. Màn Match (13) lại dùng visual gần với hẹn hò (trái tim). Rủi ro vẫn bị đọc nhầm — đẩy mạnh ẩn dụ ẩm thực (bát đầy, đôi đũa giao nhau) thay vì trái tim.<\u002Fli>\n    <li><strong>Framing \"Live Tracking\"<\u002Fstrong> ở màn 21 là card, không phải map. Tốt cho privacy. Nhưng proximity \"Còn 320m\" rất chính xác — cần làm rõ distance là chia sẻ hai chiều hay chỉ một bên thấy.<\u002Fli>\n    <li><strong>Đồng hồ OTP<\u002Fstrong>: màn 06 ghi <em class=\"vn\">\"Gửi lại (00:62)\"<\u002Fem> — 62 giây không phải giá trị hợp lệ. Nên là <em class=\"vn\">01:02<\u002Fem> hoặc <em class=\"vn\">62\"<\u002Fem>. Nhỏ nhưng nhìn thấy.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- F3 -->\n<section id=\"f3\">\n  <h2><span class=\"secno\">F3<\u002Fspan>Lưu ý dành cho mobile<\u002Fh2>\n  <p>Sản phẩm mobile-only theo design. Vài điểm quan trọng hơn so với web:<\u002Fp>\n  <ul>\n    <li><strong>Tầm ngón cái.<\u002Fstrong> Mọi CTA chính (\"Tiếp tục →\", \"Hoàn tất ✨\", \"Chốt T7 · 19:30 →\", \"I said YES ✨\") nằm ở 18% dưới cùng. Giữ sticky CTA với safe-area inset khi scroll.<\u002Fli>\n    <li><strong>Camera + vị trí + push permission<\u002Fstrong> đều cần sớm. Tách: camera ở face verify; vị trí sau view Home đầu; push sau match đầu. Không bundle.<\u002Fli>\n    <li><strong>Hình thái mạng VN<\u002Fstrong> — 4G ↔ 5G ↔ WiFi rất hay đổi. WS reconnect cho chat + tracking phải hung hăng; offline shadow state, không fail loud.<\u002Fli>\n    <li><strong>Android background<\u002Fstrong> — Live Tracking dùng geofence (không phải foreground GPS) cho pin + OS-friendly. Selfie xuất phát là foreground-only — ổn, đây là hành động chủ đích.<\u002Fli>\n    <li><strong>SMS auto-fill<\u002Fstrong> iOS sẵn có; Android cần SMS Retriever API hoặc domain-hash match.<\u002Fli>\n    <li><strong>Voice note<\u002Fstrong> (🎤) cần UX press-hold + cancel-by-slide rõ ràng — chuẩn Việt Nam (Zalo).<\u002Fli>\n    <li><strong>Haptic:<\u002Fstrong> Match (13), Vibe unlock (16), Letter open (19), Auto check-in (21) đều xứng đáng có haptic.<\u002Fli>\n    <li><strong>Notch / Dynamic Island<\u002Fstrong> — Live Tracking là use case tự nhiên cho Dynamic Island (ETA countdown). Khả năng glance ngoài app trở thành feature.<\u002Fli>\n    <li><strong>Tablet / desktop<\u002Fstrong> — không trong scope. Nếu marketing, route sang landing + QR.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- F4 -->\n<section id=\"f4\">\n  <h2><span class=\"secno\">F4<\u002Fspan>Cơ hội tối ưu &amp; tự động hoá<\u002Fh2>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Auto-coach Vibe<\u002Fspan>\n  Phát hiện chuỗi tin cộc lốc dài và đẩy chip hệ thống (\"hỏi Mate quán cũ họ thích?\") thay vì phạt. Nâng Vibe tự nhiên + bảo vệ free tier khỏi cảm giác \"phải mua Plus\".<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Đề xuất giờ theo tồn kho quán<\u002Fspan>\n  Khi đề xuất slot trong chat (màn 16), gọi inventory live của quán và chỉ hiện slot thật. Khớp với giữ bàn + voucher.<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Trợ giúp soạn Lá thư (opt-in)<\u002Fspan>\n  Dùng tag chung của hai bên gợi ý câu mở. Bắt buộc P.S. do user gõ — giữ giọng người.<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Hành động tích cực hiện trong Trust dashboard<\u002Fspan>\n  \"Viết review chi tiết kèm hình (+3)\", \"Rủ Best Mate (+5)\", \"Verify quán chưa có trong catalogue (+5)\". Gamify phục hồi mà không ép IAP.<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Co-marketing với quán<\u002Fspan>\n  Surface \"Tiệm mì Ramen Q1 ưu đãi 15% cho Mate đi đôi 19–20h\" — Deal Radar Gold đã ngầm. Incentive marketplace hai phía.<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · \"Ăn miết streak\"<\u002Fspan>\n  Streak kèo / tuần thành micro-currency mềm (topping miễn phí? sticker pack?). Rẻ hơn cashback, cảm xúc tốt.<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Hợp gu bằng embedding<\u002Fspan>\n  Coi tag gu như embedding và tính cosine similarity để rank — sạch hơn count overlap, mở đường cho content-based recommendation (review text → vector → quán gợi ý).<\u002Fdiv>\n\n  <div class=\"note opp\"><span class=\"lbl\">Opp · Anti-fraud cashback<\u002Fspan>\n  Cashback Ultimate 4-kèo dễ bị game (Mate giả). Bắt buộc Mate distinct verified + review 2 chiều positive + tối thiểu spend nếu có dữ liệu.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- F5 -->\n<section id=\"f5\">\n  <h2><span class=\"secno\">F5<\u002Fspan>Giả định cần xác nhận<\u002Fh2>\n  <p>Audit này đọc các màn theo nghĩa đen và suy luận cấu trúc ở chỗ màn còn im lặng. Các giả định được đánh dấu để engineering / product xác nhận hoặc phản bác trước khi build.<\u002Fp>\n  <div class=\"note assume\">\n    <ol>\n      <li><s>Free tier giới hạn 1 phòng chat song song.<\u002Fs> <strong>Phase 1: bỏ giả định này.<\u002Fstrong> Mọi tier đều phòng chat không giới hạn — xem Ghi chú 2.4.<\u002Fli>\n      <li>Window match freshness là <strong>48h<\u002Fstrong> (chuẩn category).<\u002Fli>\n      <li>Cooldown \"đã pass\" là <strong>24h<\u002Fstrong> mỗi cặp user-quán.<\u002Fli>\n      <li>Vibe meter <strong>không<\u002Fstrong> reset giữa các session của cùng một match.<\u002Fli>\n      <li>Auto check-in qua geofence; polygon chính xác per quán, không phải bán kính.<\u002Fli>\n      <li>Trust mặc định lúc signup = <strong>100<\u002Fstrong> (mô hình penalty-driven, không phải credit-driven).<\u002Fli>\n      <li>\"+3 Trust\" cho review-có-media là server-issued, không phải client-claim.<\u002Fli>\n      <li>Hạn Lá thư tính từ lúc <strong>gửi<\u002Fstrong>, không phải lúc <strong>mở<\u002Fstrong>.<\u002Fli>\n      <li>Cashback (Ultimate) yêu cầu <strong>4 Mate khác nhau<\u002Fstrong> trong tháng.<\u002Fli>\n      <li>\"Báo cáo\" pause cả hai tài khoản trong review (chuẩn ngành).<\u002Fli>\n      <li>Catalogue quán do Operations curate; user không tự thêm quán ở v1.<\u002Fli>\n      <li>Giá VND là currency duy nhất ở launch; renewal anniversary theo chuẩn Apple/Google.<\u002Fli>\n      <li>Voucher \"50k vì chốt nhanh\" tài trợ từ ngân sách co-marketing với quán; gross-margin neutral hoặc hơi âm cho ĂnMates.<\u002Fli>\n      <li>Search giọng nói chạy NLU trả {genre[], vibe[], distance_max}, không phải tên quán thô.<\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div>ĂnMates · Báo cáo Chiến lược UX &amp; Service Design · v1.1<\u002Fdiv>\n  <div>Soạn 25.05.2026 · cho product, UX, eng, QA, T&amp;S<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fmain>\n<\u002Fdiv>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
