  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

in:6px 0 18px;}\n  ol.steps > li{\n    counter-increment:s;\n    position:relative;\n    padding:10px 0 12px 46px;\n    border-bottom:1px dashed var(--rule);\n  }\n  ol.steps > li:last-child{border-bottom:none;}\n  ol.steps > li::before{\n    content:counter(s, decimal-leading-zero);\n    position:absolute; left:0; top:11px;\n    font-family:\"JetBrains Mono\"; font-size:11px; color:var(--berry); letter-spacing:.1em;\n  }\n  ol.steps .act{font-weight:600; color:var(--ink); display:block; margin-bottom:2px;}\n  ol.steps .sys{display:block; color:var(--ink-3); font-size:13.5px; line-height:1.55;}\n  ol.steps .scr{display:inline-block; font-family:\"JetBrains Mono\"; font-size:10.5px; color:var(--ocean); margin-top:4px; letter-spacing:.06em; text-transform:uppercase;}\n\n  table.matrix{width:100%; border-collapse:collapse; margin:16px 0 24px; font-size:12.5px;}\n  table.matrix th, table.matrix td{padding:9px 10px; border-bottom:1px solid var(--rule); text-align:center;}\n  table.matrix th:first-child, table.matrix td:first-child{text-align:left; font-weight:500;}\n  table.matrix thead th{font-family:\"JetBrains Mono\"; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); font-weight:500; background:transparent; border-bottom:1.5px solid var(--ink);}\n  table.matrix .yes{color:var(--berry); font-weight:700;}\n  table.matrix .no{color:var(--ink-4);}\n  table.matrix .lim{color:var(--ocean); font-size:11px;}\n\n  .ia{\n    background:var(--paper);\n    border:1px solid var(--rule-2);\n    padding:22px;\n    margin:22px 0 26px;\n    border-radius:2px;\n    font-family:\"JetBrains Mono\"; font-size:11.5px; line-height:1.85;\n    color:var(--ink-2);\n    overflow-x:auto;\n  }\n  .ia .root{color:var(--berry); font-weight:600;}\n  .ia .br{color:var(--ocean);}\n  .ia .lim2{color:var(--ink-4);}\n\n  .palette{display:flex; gap:14px; margin:10px 0 22px; flex-wrap:wrap;}\n  .palette .sw{flex:1 1 140px; padding:12px; border-radius:2px; color:#fff; font-family:\"JetBrains Mono\"; font-size:10px; letter-spacing:.08em;}\n  .palette .sw .nm{display:block; font-weight:500; text-transform:uppercase;}\n  .palette .sw .hex{display:block; margin-top:14px; font-size:9.5px; opacity:.85;}\n\n  footer{margin-top:80px; padding-top:24px; border-top:2px solid var(--ink); font-size:12px; color:var(--ink-3); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px;}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"shell\">\n\n<aside class=\"toc\">\n  <div class=\"brandlock\">\n    <div>\n      <span class=\"lock-an\">Ăn<\u002Fspan><span class=\"lock-mates\">Mates<\u002Fspan>\n      <span class=\"lock-sub\">Báo cáo chiến lược UX &amp; service design<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h6>Phần I · Bối cảnh<\u002Fh6>\n  <ol>\n    <li><a href=\"#s00\"><span class=\"num\">00<\u002Fspan>Tóm tắt điều hành<\u002Fa><\u002Fli>\n    <li><a href=\"#s01\"><span class=\"num\">01<\u002Fspan>Luận điểm sản phẩm<\u002Fa><\u002Fli>\n    <li><a href=\"#s02\"><span class=\"num\">02<\u002Fspan>Vai trò &amp; quyền hạn<\u002Fa><\u002Fli>\n    <li><a href=\"#s03\"><span class=\"num\">03<\u002Fspan>Kiến trúc thông tin<\u002Fa><\u002Fli>\n    <li><a href=\"#s04\"><span class=\"num\">04<\u002Fspan>Bốn cơ chế xuyên suốt<\u002Fa><\u002Fli>\n  <\u002Fol>\n\n  <h6>Phần II · Các luồng người dùng<\u002Fh6>\n  <ol>\n    <li><a href=\"#j1\"><span class=\"num\">J1<\u002Fspan>Onboarding lần đầu<\u002Fa><\u002Fli>\n    <li><a href=\"#j2\"><span class=\"num\">J2<\u002Fspan>Khám phá → Match<\u002Fa><\u002Fli>\n    <li><a href=\"#j3\"><span class=\"num\">J3<\u002Fspan>Vibe chat → First Date<\u002Fa><\u002Fli>\n    <li><a href=\"#j4\"><span class=\"num\">J4<\u002Fspan>Nhận \"Lá thư\"<\u002Fa><\u002Fli>\n    <li><a href=\"#j5\"><span class=\"num\">J5<\u002Fspan>Selfie → Live Tracking<\u002Fa><\u002Fli>\n    <li><a href=\"#j6\"><span class=\"num\">J6<\u002Fspan>Đánh giá ẩn danh<\u002Fa><\u002Fli>\n    <li><a href=\"#j7\"><span class=\"num\">J7<\u002Fspan>Hồi phục Trust &amp; IAP<\u002Fa><\u002Fli>\n    <li><a href=\"#j8\"><span class=\"num\">J8<\u002Fspan>Best Mate re-engagement<\u002Fa><\u002Fli>\n    <li><a href=\"#j9\"><span class=\"num\">J9<\u002Fspan>Huỷ · no-show · tranh chấp<\u002Fa><\u002Fli>\n  <\u002Fol>\n\n  <h6>Phần III · Phát hiện<\u002Fh6>\n  <ol>\n    <li><a href=\"#f1\"><span class=\"num\">F1<\u002Fspan>Luồng còn thiếu / chưa rõ<\u002Fa><\u002Fli>\n    <li><a href=\"#f2\"><span class=\"num\">F2<\u002Fspan>Bất nhất &amp; rủi ro UX<\u002Fa><\u002Fli>\n    <li><a href=\"#f3\"><span class=\"num\">F3<\u002Fspan>Lưu ý dành cho mobile<\u002Fa><\u002Fli>\n    <li><a href=\"#f4\"><span class=\"num\">F4<\u002Fspan>Cơ hội tối ưu &amp; tự động hoá<\u002Fa><\u002Fli>\n    <li><a href=\"#f5\"><span class=\"num\">F5<\u002Fspan>Giả định cần xác nhận<\u002Fa><\u002Fli>\n  <\u002Fol>\n<\u002Faside>\n\n<main>\n\n<header class=\"masthead\">\n  <div class=\"kicker\">UX Strategy · Service Design Audit · v1.1 · 25.05.2026<\u002Fdiv>\n  <h1>Social dining đặt quán trước,<br>được audit như một <em>service<\u002Fem>.<\u002Fh1>\n  <p class=\"lede\">\n    Phân tích toàn bộ 28 màn hình ĂnMates (đánh số theo workflow của sản phẩm) cùng tài liệu Brand system, đọc lại dưới ba lăng kính: <strong>luồng người dùng<\u002Fstrong>, <strong>vòng lặp hệ thống<\u002Fstrong>, và <strong>điểm chạm dịch vụ<\u002Fstrong>. Phục vụ cho product, UX, kỹ thuật, QA, T&amp;S và việc lập bản đồ workflow cho AI agent.\n  <\u002Fp>\n  <div class=\"meta-grid\">\n    <div><span>Phạm vi<\u002Fspan>28 màn hình · 1 brand doc<\u002Fdiv>\n    <div><span>Vai trò suy ra<\u002Fspan>5 user role + 3 system actor<\u002Fdiv>\n    <div><span>Luồng được vẽ<\u002Fspan>9 end-to-end + 14 nhánh phụ<\u002Fdiv>\n    <div><span>Khoảng trống<\u002Fspan>27 điểm thiếu / chưa rõ<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- 00 -->\n<section id=\"s00\">\n  <h2><span class=\"secno\">00<\u002Fspan>Tóm tắt điều hành<\u002Fh2>\n\n  <p>ĂnMates định vị là <strong>nền tảng social dining<\u002Fstrong>, không phải dating app — brand system nói rõ điều này: <em class=\"vn\">\"Quẹt phải để hẹn hò\"<\u002Fem> nằm trong nhóm tone-of-voice <em class=\"vn\">TRÁNH<\u002Fem>. Phép đảo mệnh đề cốt lõi của sản phẩm là <strong>chọn quán trước, chọn người sau<\u002Fstrong>. Tất cả mọi thứ còn lại — Vibe meter (Nồi Lẩu), Lá thư viết tay, Live Tracking, đánh giá ẩn danh, Trust Score, ba gói Plus / Gold / Ultimate — đều tồn tại để bảo vệ, làm duyên và monetise cho phép đảo đó.<\u002Fp>\n\n  <div class=\"pull\">\n    \"Một chạm chốt quán · một va gặp Mate · ăn miết.\"<br>\n    <cite>Brand system · v1.0 · 23.05.2026<\u002Fcite>\n  <\u002Fdiv>\n\n  <p>Cấu trúc sản phẩm có ba nhịp và một nền kinh tế:<\u002Fp>\n\n  <ul>\n    <li><strong>Chọn quán.<\u002Fstrong> Khám phá, Wishlist và màn Chi tiết quán đều mặc định <em>quán<\u002Fem> là đơn vị chính — không phải con người.<\u002Fli>\n    <li><strong>Có quyền gặp nhau.<\u002Fstrong> Match → chat → Nồi Lẩu / Vibe ≥70 mới mở khoá lịch hẹn First Date. Đây là một cái phễu <em>cố tình bị siết<\u002Fem>.<\u002Fli>\n    <li><strong>Đến đúng giờ, cư xử tử tế.<\u002Fstrong> Selfie xuất phát, auto check-in qua geofence, đánh giá ẩn danh sau buổi ăn, ± điểm Trust. Hành vi là đơn vị uy tín.<\u002Fli>\n    <li><strong>Trả tiền để phục hồi.<\u002Fstrong> Plus / Gold / Ultimate bán bảo hiểm Trust, forgiveness, capacity chat song song, và đặc quyền matching pool. Cách neo giá rất \"đời\" — <em class=\"vn\">\"khoảng 1 ly trà sữa\"<\u002Fem>, <em class=\"vn\">\"1 tô phở\"<\u002Fem>, <em class=\"vn\">\"1 set bento\"<\u002Fem> — hay, nhưng cần copy pháp lý chốt lại bên dưới.<\u002Fli>\n  <\u002Ful>\n\n  <p>Rủi ro lớn nhất hiện tại không nằm ở phần product mà ở phần <strong>service<\u002Fstrong>: UI sản phẩm rất hi-fi và tự tin, nhưng phần vận hành phía dưới — kiểm duyệt, giải quyết tranh chấp, phối hợp với quán, hoàn tiền, support, xoá tài khoản — hiện đều chưa có (hoặc chỉ được ngầm gợi ý). Mục F1–F4 bên dưới liệt kê và xếp ưu tiên các khoảng trống này.<\u002Fp>\n<\u002Fsection>\n\n<!-- 01 -->\n<section id=\"s01\">\n  <h2><span class=\"secno\">01<\u002Fspan>Luận điểm sản phẩm, đọc ngược từ thiết kế\n    <small>Mỗi màn hình đang lặng lẽ tranh luận điều gì.<\u002Fsmall>\n  <\u002Fh2>\n\n  <h3><span class=\"h3no\">1.1<\u002Fspan>Bốn luận điểm cốt lõi<\u002Fh3>\n\n  <h4>A · Quán đóng vai trò làm rõ ý định<\u002Fh4>\n  <p>Các dating app thường thất bại vì hai người lạ phải đàm phán quá nhiều: gặp không? ăn không? ở đâu? khi nào? vibe gì? ĂnMates gộp tất cả về một cam kết tiên quyết — chọn quán — và biến nó thành bộ lọc ý định chung. <em class=\"vn\">\"Cùng team thèm ramen quận 1\"<\u002Fem> là một hợp đồng xã hội nhỏ và mềm hơn nhiều so với <em class=\"vn\">\"muốn hẹn hò không?\"<\u002Fem>, lại có sẵn lối thoát (buổi ăn kết thúc).<\u002Fp>\n\n  <h4>B · Ma sát chính là tính năng an toàn<\u002Fh4>\n  <p>Hầu hết app hẹn hò xem ma sát là rò rỉ conversion. ĂnMates đảo ngược: <em class=\"vn\">\"Nồi lẩu tự sôi\"<\u002Fem> biến ma sát thành <strong>thiết bị tự sự<\u002Fstrong>. Vibe meter, ngưỡng 70%, cửa sổ 24h sau khi match, hạn 12h cho Lá thư, bước face verify — tất cả đều là <em>sự chậm có chủ đích<\u002Fem>. Sản phẩm đang bán \"tính cân nhắc\" như một thứ xa xỉ.<\u002Fp>\n\n  <h4>C · Hành vi là loại tiền tệ thứ hai<\u002Fh4>\n  <p>Trust Score (0–100, với ngưỡng &lt;80 và ≥90) là tiền tệ thứ hai sau VND. Nó siết số phòng chat song song, gác cửa Golden Match Pool (≥95) và là đích nhắm rõ ràng của mọi IAP perk. Mỗi check-in, đánh giá và rating là một bút toán trong sổ cái. Nó gần với một <em>reputation graph<\u002Fem> hơn là một score thông thường — và đáng có một bề mặt sản phẩm riêng.<\u002Fp>\n\n  <h4>D · Giá nói rõ phân khúc<\u002Fh4>\n  <div class=\"palette\">\n    <div class=\"sw\" style=\"background:#F1FFF8; color:#121212; border:1px solid var(--rule-2);\"><span class=\"nm\">Plus<\u002Fspan><span class=\"hex\" style=\"color:#5a5a5a\">29.000đ/tháng · sinh viên, mới đi làm · Phase 1 không còn perk chat song song<\u002Fspan><\u002Fdiv>\n    <div class=\"sw\" style=\"background:var(--wisteria);\"><span class=\"nm\">Gold<\u002Fspan><span class=\"hex\">59.000đ/tháng · tâm điểm bàn ăn · 70% Mates chọn · trọng tâm Vibe ×1.5 + Forgiveness<\u002Fspan><\u002Fdiv>\n    <div class=\"sw\" style=\"background:var(--berry);\"><span class=\"nm\">Ultimate<\u002Fspan><span class=\"hex\">99.000đ/tháng · VIP foodie · networker<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <p>Tầng giữa \"ngậm\" 70% chuyển đổi — đúng bài anchor-and-middle. Plus là cử chỉ thiện chí cho nhóm dễ trễ kèo nhất (sinh viên, mới đi làm). Ultimate đa phần là <em>merchandise danh tính<\u002Fem> (vương miện, viền vàng, Ghost Tracking) chứ không hẳn là utility.<\u002Fp>\n\n  <h3><span class=\"h3no\">1.2<\u002Fspan>Ngữ pháp thương hiệu được IA dựa vào<\u002Fh3>\n  <p>Audit này dẫn các token thương hiệu nhiều lần vì UI dùng chúng như <em>chất mang ngữ nghĩa<\u002Fem>, không chỉ trang trí:<\u002Fp>\n  <div class=\"palette\">\n    <div class=\"sw\" style=\"background:var(--berry);\"><span class=\"nm\">Berry Crush<\u002Fspan><span class=\"hex\">#B8336A · CTA chính · Ultimate<\u002Fspan><\u002Fdiv>\n    <div class=\"sw\" style=\"background:var(--ocean);\"><span class=\"nm\">Ocean Twilight<\u002Fspan><span class=\"hex\">#534BA8 · Trust · deep state<\u002Fspan><\u002Fdiv>\n    <div class=\"sw\" style=\"background:var(--wisteria);\"><span class=\"nm\">Wisteria<\u002Fspan><span class=\"hex\">#C490D1 · Gold · Nồi Lẩu<\u002Fspan><\u002Fdiv>\n    <div class=\"sw\" style=\"background:var(--glaucous);\"><span class=\"nm\">Glaucous<\u002Fspan><span class=\"hex\">#7D8CC4 · info · tertiary<\u002Fspan><\u002Fdiv>\n    <div class=\"sw\" style=\"background:#121212;\"><span class=\"nm\">Caviar Ink<\u002Fspan><span class=\"hex\">#121212 · text nền<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <p>Cặp font: <strong>Plus Jakarta Sans<\u002Fstrong> 500–800 cho display; <strong>Be Vietnam Pro<\u002Fstrong> 400–600 cho body và chat (dấu tiếng Việt ổn định). Mono caption (<em class=\"vn\">\"BƯỚC 2 / 5\"<\u002Fem>, <em class=\"vn\">\"VIBE 78\"<\u002Fem>) là giọng <em>bước ra ngoài<\u002Fem> để gán nhãn state — đừng dùng cho copy in-world.<\u002Fp>\n<\u002Fsection>\n\n<!-- 02 -->\n<section id=\"s02\">\n  <h2><span class=\"secno\">02<\u002Fspan>Vai trò &amp; quyền hạn\n    <small>Suy ra từ state hiển thị, các gate và IAP gating.<\u002Fsmall>\n  <\u002Fh2>\n\n  <h3><span class=\"h3no\">2.1<\u002Fspan>Vai trò người dùng (suy luận)<\u002Fh3>\n  <ul>\n    <li><strong>Guest / chưa đăng nhập<\u002Fstrong> — chỉ Splash + 3 màn onboarding edu. Không lưu trạng thái, không matching.<\u002Fli>\n    <li><strong>Mate chưa verify<\u002Fstrong> — đã xong OTP nhưng chưa face-verify và chưa hoàn thiện hồ sơ. Gần như chỉ read-only trong matching pool; không gửi được lời mời.<\u002Fli>\n    <li><strong>Verified Mate (Free)<\u002Fstrong> — tài khoản đầy đủ; pool mặc định; Trust khởi điểm = 100 (giả định); <strong>phòng chat không giới hạn<\u002Fstrong> ở Phase 1 (xem ghi chú 2.4).<\u002Fli>\n    <li><strong>Plus subscriber<\u002Fstrong> — +10 Trust Booster mỗi tháng, Point ×1.2, badge khung viền xanh nhẹ. <em>Phase 1: bỏ quyền lợi \"3 phòng chat song song\" — đã trở thành mặc định cho mọi tier.<\u002Fem><\u002Fli>\n    <li><strong>Gold subscriber<\u002Fstrong> — Instant Amnesty (reset 100), miễn 1 lần huỷ/tháng, Vibe ×1.5, Deal Radar, badge Wisteria + 👑. <em>Phase 1: bỏ \"Unlimited phòng chat\" — đã là baseline.<\u002Fem><\u002Fli>\n    <li><strong>Ultimate subscriber<\u002Fstrong> — Trust Freeze (khoá 100), Golden Match Pool (chỉ ghép Mate ≥95), Peak Hour Priority, Ghost Tracking (xem ai đã lướt profile), cashback 100k khi đi đủ 4 kèo.<\u002Fli>\n    <li><strong>\"Best Mate\"<\u002Fstrong> — nhãn dẫn xuất sau ≥3 buổi ăn cùng một người. Xuất hiện trong inbox Chat, không phải tier trả phí.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">2.2<\u002Fspan>Vai trò vận hành / hệ thống (phải tồn tại, chưa có màn)<\u002Fh3>\n  <ul>\n    <li><strong>Đối tác quán<\u002Fstrong> — ngầm trong <em class=\"vn\">\"còn bàn 2 chỗ\"<\u002Fem> và cơ chế voucher. Bề mặt chưa có.<\u002Fli>\n    <li><strong>Mod Trust &amp; Safety<\u002Fstrong> — ngầm trong nút <em class=\"vn\">\"Báo cáo\"<\u002Fem> ở màn đánh giá. Bề mặt chưa có.<\u002Fli>\n    <li><strong>Customer support<\u002Fstrong> — bắt buộc cho IAP refund, dispute. Bề mặt chưa có.<\u002Fli>\n    <li><strong>Marketing operations<\u002Fstrong> — Deal Radar (Gold), Peak Hour Priority (Ultimate), <em class=\"vn\">\"giờ vàng\"<\u002Fem>. Cần một bề mặt curate.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">2.3<\u002Fspan>Ma trận quyền (capability × tier)<\u002Fh3>\n  <table class=\"matrix\">\n    <thead>\n      <tr><th>Năng lực<\u002Fth><th>Guest<\u002Fth><th>Chưa verify<\u002Fth><th>Free<\u002Fth><th>Plus<\u002Fth><th>Gold<\u002Fth><th>Ultimate<\u002Fth><\u002Ftr>\n    <\u002Fthead>\n    <tbody>\n      <tr><td>Duyệt Khám phá / Wishlist<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><\u002Ftr>\n      <tr><td>Quẹt / gửi lời mời<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><\u002Ftr>\n      <tr><td>Phòng chat song song <span style=\"font-size:9.5px; color:var(--berry);\">(Phase 1)<\u002Fspan><\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">∞<\u002Ftd><td class=\"yes\">∞<\u002Ftd><td class=\"yes\">∞<\u002Ftd><td class=\"yes\">∞<\u002Ftd><\u002Ftr>\n      <tr><td>Tốc độ Vibe progression<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td>1×<\u002Ftd><td>1×<\u002Ftd><td class=\"yes\">1.5×<\u002Ftd><td class=\"yes\">1.5×<\u002Ftd><\u002Ftr>\n      <tr><td>Xem Trust score của mình<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"lim\">một phần<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><\u002Ftr>\n      <tr><td>Trust freeze / amnesty<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"lim\">+10/tháng<\u002Ftd><td class=\"lim\">reset 1×<\u002Ftd><td class=\"yes\">khoá<\u002Ftd><\u002Ftr>\n      <tr><td>Golden Match Pool (Trust ≥95)<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">✓<\u002Ftd><\u002Ftr>\n      <tr><td>Ghost Tracking<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">✓<\u002Ftd><\u002Ftr>\n      <tr><td>Deal Radar<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">✓<\u002Ftd><td class=\"yes\">✓<\u002Ftd><\u002Ftr>\n      <tr><td>Huỷ không bị trừ Trust<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"lim\">1/tháng<\u002Ftd><td class=\"yes\">∞<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n  <div class=\"note\" style=\"border-left:3px solid var(--berry);\">\n    <span class=\"lbl\">Ghi chú 2.4 · Quyết định Phase 1 · Chat không giới hạn cho mọi tier<\u002Fspan>\n    <p>Ở giai đoạn launch, ĂnMates <strong>không siết số phòng chat song song<\u002Fstrong> cho bất kỳ tier nào — Free, Plus, Gold, Ultimate đều ∞. Lý do và hệ luỵ thiết kế:<\u002Fp>\n    <ul>\n      <li><strong>Lý do:<\u002Fstrong> giảm rào cản trải nghiệm core (chat = nồi lẩu chính); tăng cơ hội đạt Vibe ≥70 → First Date → review → bút toán Trust. Càng nhiều chat song song, càng nhiều dữ liệu để Trust economy vận hành.<\u002Fli>\n      <li><strong>Hệ luỵ với Plus:<\u002Fstrong> mất một perk hiển thị. Cần re-package giá trị — gợi ý ở §J7.<\u002Fli>\n      <li><strong>Hệ luỵ với Gold:<\u002Fstrong> \"Unlimited phòng chat\" không còn là điểm khác biệt; trọng tâm chuyển hẳn về Vibe ×1.5 + Forgiveness + Deal Radar.<\u002Fli>\n      <li><strong>Hệ luỵ với engineering:<\u002Fstrong> phải lường chi phí WS / push / storage tăng tuyến tính theo số chat. Quy hoạch quota technical (vd ≤200 phòng active/user) thay vì quota commercial.<\u002Fli>\n      <li><strong>Hệ luỵ với chống lạm dụng:<\u002Fstrong> spam chat trở thành rủi ro cao hơn. Cần rate-limit số match mới / 24h và auto-archive sau 7 ngày không tin (đã đề xuất ở §J3).<\u002Fli>\n      <li><strong>Phase 2 trở đi:<\u002Fstrong> nếu muốn re-introduce, dùng cơ chế \"quota active room\" (vd Free 5, Plus 15, Gold ∞) thay vì cấm cứng — vẫn giữ tinh thần không siết core.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 03 -->\n<section id=\"s03\">\n  <h2><span class=\"secno\">03<\u002Fspan>Kiến trúc thông tin\n    <small>Bốn tab chính, vài luồng modal, một bề mặt trả phí.<\u002Fsmall>\n  <\u002Fh2>\n\n  <h3><span class=\"h3no\">3.1<\u002Fspan>Khung điều hướng đáy<\u002Fh3>\n  <p>Vỏ home lộ ra bốn tab, nhất quán trên các màn 09, 10, 14, 23–28: <em class=\"vn\">Khám phá<\u002Fem>, <em class=\"vn\">Wishlist<\u002Fem>, <em class=\"vn\">Chat<\u002Fem>, <em class=\"vn\">Mình<\u002Fem>. Mọi thứ không thuộc bốn tab này đều là modal khởi từ tab (matching, scheduling, tracking, review) hoặc bề mặt trả phí đứng riêng (IAP).<\u002Fp>\n\n  <div class=\"ia\">\n<span class=\"root\">App ĂnMates<\u002Fspan>\n├── <span class=\"br\">Pre-auth<\u002Fspan> (Splash → Onboard ×3 → Login → OTP → Face verify → Profile → Gu → Photos)\n└── Sau đăng nhập\n    ├── <span class=\"br\">Khám phá<\u002Fspan>\n    │   ├── Tile genre · Vibe · Hot quanh bạn\n    │   ├── Search (text + voice)\n    │   └── Chi tiết quán → Dining swipe → Match → Chat\n    ├── <span class=\"br\">Wishlist<\u002Fspan>\n    │   ├── Quán đã lưu (theo quận)\n    │   ├── Kèo đã đi qua (lịch sử + ảnh)\n    │   └── Best Mates rail\n    ├── <span class=\"br\">Chat<\u002Fspan>\n    │   ├── Mới match (cửa sổ hello 24h)\n    │   ├── Đang tám (kèm Vibe meter mỗi dòng)\n    │   ├── Best Mate rail (≥3 lần ăn cùng)\n    │   └── Phòng → Vibe chat → First Date → Live Tracking → Review\n    └── <span class=\"br\">Mình<\u002Fspan>\n        ├── Profile public (cung · ngũ hành · numerology · vibe)\n        ├── Album · số Wishlist · số Best Mates\n        ├── Trust dashboard\n        └── Gói ĂnMates → IAP (Plus / Gold / Ultimate)\n\n<span class=\"lim2\">Modal / surface không thuộc tab<\u002Fspan>\n├── Lá thư (lời mời đến) — push deep-link\n├── Selfie xuất phát — geofence trigger\n├── Live Tracking — bật tự động 45′ trước hẹn\n├── Đánh giá ẩn danh — bật ~T+30′ sau check-in\n└── IAP rescue — khi Trust &lt;80\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">3.2<\u002Fspan>Ma trận modal &amp; trigger<\u002Fh3>\n  <p>Sáu bề mặt chỉ tồn tại dạng modal, kích hoạt theo thời gian / sự kiện, không có tab cố định. Mỗi bề mặt cần một đường quay lại (history / archive) — xem F1.<\u002Fp>\n  <table class=\"matrix\" style=\"font-size:12px;\">\n    <thead>\n      <tr><th>Modal<\u002Fth><th>Trigger<\u002Fth><th>Hạn?<\u002Fth><th>Quay lại?<\u002Fth><\u002Ftr>\n    <\u002Fthead>\n    <tbody>\n      <tr><td>Lá thư đến<\u002Ftd><td>Push khi có invite<\u002Ftd><td class=\"yes\">12h<\u002Ftd><td class=\"lim\">chưa rõ<\u002Ftd><\u002Ftr>\n      <tr><td>Lập lịch First Date<\u002Ftd><td>Tap CTA khi Vibe ≥70<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">header chat<\u002Ftd><\u002Ftr>\n      <tr><td>Selfie xuất phát<\u002Ftd><td>Geofence T-45′<\u002Ftd><td class=\"yes\">tới ETA<\u002Ftd><td class=\"no\">không<\u002Ftd><\u002Ftr>\n      <tr><td>Live Tracking<\u002Ftd><td>Selfie xác nhận<\u002Ftd><td class=\"yes\">tới check-in<\u002Ftd><td class=\"no\">không<\u002Ftd><\u002Ftr>\n      <tr><td>Đánh giá ẩn danh<\u002Ftd><td>T+30′ sau check-in<\u002Ftd><td class=\"yes\">48h (giả định)<\u002Ftd><td class=\"lim\">chưa rõ<\u002Ftd><\u002Ftr>\n      <tr><td>IAP rescue<\u002Ftd><td>Trust &lt;80<\u002Ftd><td class=\"no\">—<\u002Ftd><td class=\"yes\">tab Mình<\u002Ftd><\u002Ftr>\n    <\u002Ftbody>\n  <\u002Ftable>\n\n  <h3><span class=\"h3no\">3.3<\u002Fspan>Trục onboarding 5 bước<\u002Fh3>\n  <p>Tiêu đề các màn 06–10 (<em class=\"vn\">\"BƯỚC 2 / 5\"<\u002Fem>, <em class=\"vn\">\"3/5\"<\u002Fem>, <em class=\"vn\">\"4/5\"<\u002Fem>, <em class=\"vn\">\"5/5\"<\u002Fem>) khai báo phễu 5 bước gate-by-gate. Danh sách bước thực tế ngầm:<\u002Fp>\n  <ol>\n    <li>Nhập số điện thoại (màn 05)<\u002Fli>\n    <li>OTP (màn 06)<\u002Fli>\n    <li>Face verify (màn 07) — đang được tính vào bước 2 ở counter nhưng thực tế là gate riêng<\u002Fli>\n    <li>Thông tin cá nhân + tự suy ra cung / ngũ hành / numerology (màn 08)<\u002Fli>\n    <li>Gu ẩm thực (màn 09) — tối thiểu 5 thẻ<\u002Fli>\n    <li>Ảnh (màn 10) — tối đa 3, có \"Bỏ qua\"<\u002Fli>\n  <\u002Fol>\n  <p>Sáu bước logic nhưng counter ghi 5. Việc màn 07 không có chip progress là điểm bất nhất nhỏ nhưng có thật — xem F2.<\u002Fp>\n<\u002Fsection>\n\n<!-- 04 -->\n<section id=\"s04\">\n  <h2><span class=\"secno\">04<\u002Fspan>Bốn cơ chế xuyên suốt\n    <small>Vibe · Trust · Wishlist · Lá thư — chạm vào mọi luồng.<\u002Fsmall>\n  <\u002Fh2>\n\n  <h3><span class=\"h3no\">4.1<\u002Fspan>Vibe meter (\"Nồi Lẩu\")<\u002Fh3>\n  <p>Vibe meter là điểm 0–100 cho mỗi phòng chat, leo lên khi cả hai gửi tin. Thấy ở màn 15 (Vibe 42, locked) và màn 16 (Vibe 72, unlocked). Ngưỡng 70 mở khoá CTA <em class=\"vn\">First Date<\u002Fem>. Màn 15 có dòng coach: <em class=\"vn\">\"Chat thêm ~10 tin chất lượng nữa\"<\u002Fem> — tức là tăng theo tin <em>chất lượng<\u002Fem>, không phải tin thô.<\u002Fp>\n  <div class=\"note\">\n    <span class=\"lbl\">Phần chưa hiển thị<\u002Fspan>\n    <p>Tín hiệu cấu thành Vibe không lộ ra. Hợp lý nhất: độ dài tin, độ trễ phản hồi, tính tương hỗ hai chiều, sentiment, có media hay không, có voice note hay không, có dùng các chip \"Topping tủ?\", \"Có order bia ko?\". Người dùng không cần thấy chi tiết, nhưng bề mặt kiểm duyệt phải <em>inspect<\u002Fem> được các tín hiệu. <strong>Gold được Vibe ×1.5<\u002Fstrong> — multiplier này phải hiển thị ở đâu đó, nếu không thì không có giá trị truyền thông.<\u002Fp>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">4.2<\u002Fspan>Trust Score<\u002Fh3>\n  <p>Thang 0–100. Ngưỡng: <strong>≥90 Perfect Mate<\u002Fstrong> (top 8%, màn 24), <strong>80–89 Trusted<\u002Fstrong>, <strong>&lt;80 giới hạn 1 phòng chat<\u002Fstrong>. Hiển thị ở thẻ profile dạng badge số (<em class=\"vn\">\"Trust 98\"<\u002Fem>).<\u002Fp>\n  <p>Bút toán nhìn thấy (màn 24):<\u002Fp>\n  <ul>\n    <li><strong>+2<\u002Fstrong> check-in đúng giờ (qua geofence)<\u002Fli>\n    <li><strong>+3<\u002Fstrong> review chi tiết kèm hình<\u002Fli>\n    <li><strong>+1<\u002Fstrong> được Mate đánh giá 5★ \"lịch sự\"<\u002Fli>\n    <li><strong>−<\u002Fstrong> trễ 18′ (miễn một phần vì tắc đường — auto-forgiveness)<\u002Fli>\n  <\u002Ful>\n  <p>Ngầm nhưng chưa thấy: phạt no-show, phạt huỷ liên tục, phạt sau khi bị báo cáo và xác nhận, phạt ảnh giả, phạt sai DOB. Dashboard cần view \"tất cả sự kiện\" và cổng appeal — xem F1.<\u002Fp>\n\n  <h3><span class=\"h3no\">4.3<\u002Fspan>Wishlist — kho ý định đuôi dài<\u002Fh3>\n  <p>Wishlist đang gánh ba việc cùng lúc trên màn 10 / Wishlist:<\u002Fp>\n  <ol>\n    <li><strong>Quán đã lưu<\u002Fstrong>, gom theo quận, gắn HOT và giải giá.<\u002Fli>\n    <li><strong>Kèo đã đi qua<\u002Fstrong> — kèm tên Mate + rating. Thực chất là lịch sử buổi ăn.<\u002Fli>\n    <li><strong>Kho ảnh<\u002Fstrong> — thư viện ảnh từ các buổi ăn cũ.<\u002Fli>\n  <\u002Fol>\n  <p>Ba khái niệm trên một tab là rủi ro IA — xem F2. Sửa nhỏ nhất là hai sub-tab (Quán / Đã đi qua), ảnh gộp vào tab thứ hai.<\u002Fp>\n\n  <h3><span class=\"h3no\">4.4<\u002Fspan>Lá thư viết tay<\u002Fh3>\n  <p>Màn 18 và 19 giới thiệu cơ chế \"thư viết tay\" rất đặc trưng: thiệp có tem, dấu bưu cục, ngày, chip quán, chữ ký người gửi. <em class=\"vn\">\"Hồi âm trong 12 tiếng · đồng ý sẽ thêm vào lịch\"<\u002Fem>. Đây là khoảnh khắc UX có ý kiến mạnh nhất của sản phẩm — và là điểm dễ được nhắc nhất trong review app store.<\u002Fp>\n  <p>Hệ luỵ thiết kế: thư là <strong>cách duy nhất<\u002Fstrong> để chốt kèo một chiều (tức là không cần Vibe ≥70). Nó bypass Vibe gate, nên là kênh đòn bẩy cao cho người gửi tự tin — và là vector dễ spam nếu không có rate-limit. Bề mặt <em>soạn thư<\u002Fem> của người gửi <strong>chưa có trong bộ màn<\u002Fstrong>. Xem F1.<\u002Fp>\n<\u002Fsection>\n\n<!-- ============== Phần II — Journeys ============== -->\n\n<!-- J1 -->\n<section id=\"j1\">\n  <h2><span class=\"secno\">J1<\u002Fspan>Onboarding lần đầu → tài khoản dùng được\n    <small>Guest → Verified Mate sẵn sàng xuất hiện trong pool.<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Guest → Unverified → Verified<\u002Fspan>\n    <span class=\"chip\">Màn 01–10<\u002Fspan>\n    <span class=\"chip\">~5 phút (happy path)<\u002Fspan>\n    <span class=\"chip ocean\">High-stakes<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J1.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Đăng ký, chứng minh là người thật, và đến Khám phá với đủ dữ liệu khẩu vị để match có ích trong phiên đầu tiên.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Mở app lần đầu, hoặc sau logout / xoá tài khoản. Deep-link từ giới thiệu bạn cũng đổ về đây.<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>iOS 15+ / Android 10+ (giả định). Quyền camera. SMS đến được số VN. Có mạng. Đồng hồ máy không bị lệch quá xa (cho OTP).<\u002Ftd><\u002Ftr>\n    <tr><th>Quyền / vai trò<\u002Fth><td>Guest → Unverified Mate (sau OTP) → Verified Mate (sau face) → Active Mate (sau ảnh).<\u002Ftd><\u002Ftr>\n    <tr><th>Business rule<\u002Fth><td>\n      <ul>\n        <li>Một tài khoản / số điện thoại; một face embedding / tài khoản.<\u002Fli>\n        <li>Tối thiểu 5 thẻ gu ăn (màn 09 hiển thị <em class=\"vn\">\"4 / 5 đã chọn\"<\u002Fem>).<\u002Fli>\n        <li>Ảnh có \"Bỏ qua\" nhưng đi kèm cảnh báo <em class=\"vn\">\"Mate ăn cùng sẽ thấy đầu tiên\"<\u002Fem>.<\u002Fli>\n        <li>DOB dùng để auto-derive cung, ngũ hành, numerology — DOB thô không hiển thị cho Mate khác.<\u002Fli>\n        <li>Selfie chỉ để verify — <em class=\"vn\">\"Không lưu hình, không bán dữ liệu\"<\u002Fem>. Embedding có thể giữ, ảnh thô phải huỷ.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n\n  <h3><span class=\"h3no\">J1.2<\u002Fspan>Các bước chi tiết<\u002Fh3>\n  <ol class=\"steps\">\n    <li><span class=\"act\">Mở app · thấy splash với lockup và copy loader <em class=\"vn\">\"Đang nhóm lửa nồi lẩu…\"<\u002Fem><\u002Fspan><span class=\"sys\">Hệ thống: warm cache, lấy feature flag, kiểm tra session token. Nếu session còn hiệu lực → bỏ qua, vào Home.<\u002Fspan><span class=\"scr\">màn 01<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Vuốt 3 thẻ edu (Chọn quán · Match · Vibe); mỗi thẻ có \"Bỏ qua\".<\u002Fspan><span class=\"sys\">Đánh dấu <code>onboarding_seen<\u002Fcode> client-side khi bất kỳ thẻ nào bị dismiss hoặc \"Bắt đầu\" được nhấn.<\u002Fspan><span class=\"scr\">màn 02 · 03 · 04<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Nhấn <em class=\"vn\">\"Bắt đầu\"<\u002Fem> hoặc Skip → đến nhập số điện thoại; mã quốc gia mặc định 🇻🇳 +84.<\u002Fspan><span class=\"sys\">Hiển thị bàn phím số; validate libphonenumber có debounce; \"Gửi mã\" disabled tới khi đủ 9–10 số định dạng local.<\u002Fspan><span class=\"scr\">màn 05<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Nhấn <em class=\"vn\">\"Gửi mã xác minh\"<\u002Fem> → màn OTP 6 số.<\u002Fspan><span class=\"sys\">POST <code>/auth/otp/request<\u002Fcode>. Server trả <code>session_request_id<\u002Fcode>, hạn 90s, rate-limit 3 lần / 15 phút / số. iOS auto-fill SMS.<\u002Fspan><span class=\"scr\">màn 06<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Nhập OTP trong 90s. Nút \"Gửi lại\" mở sau 60s.<\u002Fspan><span class=\"sys\">POST <code>/auth/otp/verify<\u002Fcode>. Thành công → server cấp <code>signup_token<\u002Fcode> ngắn hạn (không phải session đầy đủ — face verify vẫn còn).<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Face verify: quay đầu chậm trái → phải, không mask, mặt vào khung.<\u002Fspan><span class=\"sys\">Liveness on-device (Apple Vision / ML Kit giả định) + chống replay phía server. Lưu embedding, huỷ frame thô sau match.<\u002Fspan><span class=\"scr\">màn 07<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Profile cơ bản: họ tên, tên thân mật, DOB.<\u002Fspan><span class=\"sys\">DOB kích hoạt auto-derive: cung (Song Tử), ngũ hành (Bạch Lạp Kim · Tân Tị · 2001), số chủ đạo. User chỉ preview, không sửa được.<\u002Fspan><span class=\"scr\">màn 08<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Chọn slider \"Tính cách bàn ăn\" (Introvert ↔ Ambivert ↔ Extrovert).<\u002Fspan><span class=\"sys\">Lưu giá trị 0–100; ba mốc preset chỉ là display sugar.<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Chọn ≥5 thẻ gu ẩm thực + ≥1 thẻ vibe-buổi-ăn.<\u002Fspan><span class=\"sys\">Counter <em class=\"vn\">\"4 / 5 đã chọn\"<\u002Fem> live-update. CTA enable khi đủ 5.<\u002Fspan><span class=\"scr\">màn 09 Gu ẩm thực<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Thêm tối đa 3 ảnh (camera / library / Instagram) và chọn ảnh main.<\u002Fspan><span class=\"sys\">Upload chạy check NSFW + face-presence; reject kèm lý do rõ ràng. Có handle kéo-thả để sắp xếp.<\u002Fspan><span class=\"scr\">màn 10<\u002Fspan><\u002Fli>\n\n    <li><span class=\"act\">Nhấn <em class=\"vn\">\"Hoàn tất ✨\"<\u002Fem> → vào Khám phá.<\u002Fspan><span class=\"sys\">Server đổi <code>signup_token<\u002Fcode> sang access+refresh. Gợi ý phiên đầu seed theo quận + thẻ gu + thời điểm trong ngày.<\u002Fspan><span class=\"scr\">màn 09 Home<\u002Fspan><\u002Fli>\n  <\u002Fol>\n\n  <h3><span class=\"h3no\">J1.3<\u002Fspan>Quy tắc xác thực<\u002Fh3>\n  <ul>\n    <li>Số điện thoại: định dạng VN / E.164. Chặn các prefix VoIP / số ảo.<\u002Fli>\n    <li>OTP: 6 số, dùng một lần, TTL 90s, tối đa 5 lần thử / request.<\u002Fli>\n    <li>Face: liveness ≥ ngưỡng; reject nếu có mask, kính che mắt, &lt;1 hoặc &gt;1 khuôn mặt, độ phân giải hiệu dụng &lt;480p.<\u002Fli>\n    <li>Nickname: 2–20 ký tự, không slur (kể cả bỏ dấu), không cần unique.<\u002Fli>\n    <li>DOB: ≥18 (gate cứng — sản phẩm gắn với rượu bia).<\u002Fli>\n    <li>Thẻ gu: ≥5. Thẻ vibe: khuyến nghị ≥1.<\u002Fli>\n    <li>Ảnh: jpg/png/heic, ≤8MB, ảnh Main bắt buộc có mặt, không lộ số điện thoại / URL (OCR check).<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J1.4<\u002Fspan>Lỗi &amp; fallback<\u002Fh3>\n  <ul>\n    <li><strong>OTP không tới<\u002Fstrong> → \"Gửi lại\" sau 60s; sau 2 lần fail → fallback voice-call OTP; sau 3 lần → tạm khoá số 24h kèm copy hướng dẫn.<\u002Fli>\n    <li><strong>Face fail 3 lần<\u002Fstrong> → soft-block, mở luồng review thủ công bằng CMND/CCCD (cần legal review).<\u002Fli>\n    <li><strong>DOB &lt;18<\u002Fstrong> → lỗi terminal: <em class=\"vn\">\"ĂnMates dành cho 18+\"<\u002Fem>.<\u002Fli>\n    <li><strong>Mất mạng giữa upload ảnh<\u002Fstrong> → giữ nguyên các bước trước; retry ảnh; không trigger lại OTP.<\u002Fli>\n    <li><strong>Trùng face embedding ở số khác<\u002Fstrong> → đẩy về support; hiển thị \"Cần xác minh thêm\" kèm mã ticket.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J1.5<\u002Fspan>Nhánh thay thế<\u002Fh3>\n  <ul>\n    <li><strong>Đăng nhập Apple ID<\u002Fstrong> (màn 05) — giả định bỏ qua phone+OTP nhưng vẫn phải face + profile + gu + ảnh. Counter cần phản ánh đúng \"3/5\".<\u002Fli>\n    <li><strong>Skip ảnh<\u002Fstrong> → vào Home nhưng bị ẩn khỏi Dining swipe pool tới khi có ≥1 ảnh có mặt. Cần banner nhắc dismissible.<\u002Fli>\n    <li><strong>Resume sau khi bỏ dở<\u002Fstrong> → lần mở sau deep-link tới bước dang dở cao nhất. State lưu server, không phải client.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J1.6<\u002Fspan>Edge cases<\u002Fh3>\n  <ul>\n    <li>Sinh đôi / anh em ruột trùng mặt — cần văn bản policy T&amp;S.<\u002Fli>\n    <li>Số điện thoại bị chuyển nhượng — cần luồng đổi số (xem F1).<\u002Fli>\n    <li>Người dùng không có số VN — sản phẩm VN-first, copy không nói rõ.<\u002Fli>\n    <li>iPad chỉ Wi-Fi — SMS không tới; cần fallback email hoặc WhatsApp OTP.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J1.7<\u002Fspan>Dữ liệu tạo / cập nhật<\u002Fh3>\n  <p><code>users<\u002Fcode> (hash phone, DOB, name, nickname), <code>profile_derived<\u002Fcode> (cung, ngũ hành, numerology, personality slider), <code>tastes<\u002Fcode> (cuisine + vibe tag), <code>photos<\u002Fcode> (max 3, main flag, order), <code>identity_verifications<\u002Fcode> (embedding, liveness score, ts), <code>consent<\u002Fcode> (Điều khoản, Quy tắc cộng đồng, data-use, version).<\u002Fp>\n\n  <h3><span class=\"h3no\">J1.8<\u002Fspan>Cân nhắc UX &amp; pain point<\u002Fh3>\n  <ul>\n    <li>Counter 5 bước bị lệch (face verify không có chip ở màn 07). Hoặc bỏ counter ở màn đặc biệt, hoặc đánh lại 6/6.<\u002Fli>\n    <li>Auto-derive cung/ngũ hành/numerology rất duyên nhưng nên có toggle \"không hiển thị\" — sẽ có user cảm thấy pseudoscientific.<\u002Fli>\n    <li>Instagram import là cliff về quyền riêng tư và phức tạp OAuth; v1 chỉ cần Camera + Library.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J1.9<\u002Fspan>Cơ hội<\u002Fh3>\n  <ul>\n    <li>Pre-warm gợi ý phiên đầu trong lúc chờ face-verify; vào Home đã có content.<\u002Fli>\n    <li>Coi 5 thẻ là soft-cap thay vì hard — hiện hint banner thay vì disable CTA, kèm microcopy \"còn thiếu gì\".<\u002Fli>\n    <li>Cho phép import gu từ Foody / Now / iFood (post-MVP) bằng một tap.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- J2 -->\n<section id=\"j2\">\n  <h2><span class=\"secno\">J2<\u002Fspan>Khám phá → Dining swipe → Match\n    <small>Active Mate → cặp đôi đầu tiên \"cùng team thèm quán này\".<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Verified Mate<\u002Fspan>\n    <span class=\"chip\">Màn 09 Home · 11 · 12 · 13<\u002Fspan>\n    <span class=\"chip\">~30s–2 phút<\u002Fspan>\n    <span class=\"chip wist\">Core loop<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J2.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Tìm quán đang thèm tối nay; thấy một Mate cũng đang thèm; đồng ý vào chat.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Đói / chán / social proof push (\"15 người quanh đây cũng đang thèm…\"). Push tự gửi vào khung giờ ăn (Peak Hour cho Ultimate).<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Verified profile · quyền vị trí · ≥1 ảnh có mặt · Trust ≥0 (không bị ban).<\u002Ftd><\u002Ftr>\n    <tr><th>Backend / API<\u002Fth><td>\n      <ul>\n        <li><code>GET /home<\u002Fcode> — genre tile, vibe tile, \"hot quanh bạn\" (kèm khoảng cách + lượt thèm).<\u002Fli>\n        <li><code>GET /restaurants/:id<\u002Fcode> — hero, chip menu, vibe tag, distance, price, % hợp gu.<\u002Fli>\n        <li><code>POST /wishlist/:rid<\u002Fcode> — thêm (idempotent).<\u002Fli>\n        <li><code>GET /restaurants/:id/swipe-pool<\u002Fcode> — danh sách Mate cũng vừa chọn quán này trong 6h gần đây (giả định window), sort theo overlap gu + Trust + distance.<\u002Fli>\n        <li><code>POST /swipes<\u002Fcode> — {target, direction, restaurant_id}.<\u002Fli>\n        <li><code>POST /matches/check<\u002Fcode> — server đánh giá mutual, trả match_id hoặc null.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Validation<\u002Fth><td>Không quẹt chính mình; cooldown 24h nếu đã pass; nếu Trust &lt;80, giới hạn số profile / phiên / quán (chống spam — giả định).<\u002Ftd><\u002Ftr>\n    <tr><th>Business rule<\u002Fth><td>\n      <ul>\n        <li>% hợp gu dùng overlap gu + vibe.<\u002Fli>\n        <li>Pool scope theo quán — rời quán là deck reset.<\u002Fli>\n        <li>Trust ≥95 trong pool có badge \"Perfect Mate\" nhẹ.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n\n  <h3><span class=\"h3no\">J2.2<\u002Fspan>Bước chi tiết<\u002Fh3>\n  <ol class=\"steps\">\n    <li><span class=\"act\">Mở Khám phá. Thấy lời chào, quận, search, rail genre/vibe và \"Hot quanh bạn · 18:00\".<\u002Fspan><span class=\"sys\">Tiêu đề khung giờ thay đổi; \"Hot\" rerank ~15′. Counter \"X người đang thèm\" cập nhật thật.<\u002Fspan><span class=\"scr\">màn 09 Home<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Tap thẻ quán — Tiệm mì Ramen Q1.<\u002Fspan><span class=\"sys\">Vào màn chi tiết: hero, rating, distance, % hợp gu, vibe tag (\"Cay 3 ✓ · Không hành ✓ · Khuất hẻm ✓\").<\u002Fspan><span class=\"scr\">màn 11<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Tuỳ chọn: <em class=\"vn\">\"＋ Wishlist\"<\u002Fem>.<\u002Fspan><span class=\"sys\">Toast xác nhận; badge tab Wishlist tăng.<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Nhấn <em class=\"vn\">\"Tìm Mate ăn cùng ↗\"<\u002Fem>.<\u002Fspan><span class=\"sys\">Vào Dining swipe scope theo quán này.<\u002Fspan><span class=\"scr\">màn 12<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Xem thẻ Mate: ảnh, tên, tuổi, badge Trust (\"Trust 98\"), distance, status quip, chip gu, \"Cũng vừa thêm quán này · 2 phút trước\".<\u002Fspan><span class=\"sys\">Chip freshness là minh chứng cho \"place-first intent\".<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Quẹt phải (like) / trái (pass) / lên (super-like — giả định).<\u002Fspan><span class=\"sys\">Phải: <code>POST /swipes<\u002Fcode>; server check mutual và trả match_id nếu hai bên cùng quẹt phải trong window 48h (giả định).<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Match → màn full-bleed \"Có Mate rồi!\" với hai avatar và quán chung.<\u002Fspan><span class=\"sys\">Timer 24h \"hello\" bắt đầu (màn 14: <em class=\"vn\">\"Nói 'Hello' trước trong vòng 24h để giữ kèo\"<\u002Fem>).<\u002Fspan><span class=\"scr\">màn 13<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Tap <em class=\"vn\">\"Nói 'Hello' trước đi 👋\"<\u002Fem> → vào phòng chat, hiện Vibe meter.<\u002Fspan><\u002Fli>\n  <\u002Fol>\n\n  <h3><span class=\"h3no\">J2.3<\u002Fspan>Lỗi &amp; fallback<\u002Fh3>\n  <ul>\n    <li><strong>Pool rỗng<\u002Fstrong> → <em class=\"vn\">\"Chưa có Mate cho quán này. Bookmark vào Wishlist và bật notify.\"<\u002Fem> kèm CTA notify-me một tap.<\u002Fli>\n    <li><strong>Tắt vị trí<\u002Fstrong> → degrade về quận mặc định; banner non-block nhắc bật.<\u002Fli>\n    <li><strong>Vượt rate quẹt<\u002Fstrong> (Trust &lt;80) → soft-cap kèm copy đề nghị cải thiện Trust, không phải lỗi cứng.<\u002Fli>\n    <li><strong>Match cũ<\u002Fstrong> (đối phương xoá tk giữa lúc đang quẹt) → match_id resolve sang placeholder \"đã rời\"; pool tự refresh.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J2.4<\u002Fspan>Nhánh thay thế<\u002Fh3>\n  <ul>\n    <li><strong>Search bằng giọng nói<\u002Fstrong> (🎙️ màn 09) → ASR resolve trước thành genre/vibe tag; quán match sau.<\u002Fli>\n    <li><strong>Tìm theo Mate<\u002Fstrong> không có — xem F1 (có thể có chủ ý).<\u002Fli>\n    <li><strong>Ăn nhóm<\u002Fstrong> (≥3) không có — xem F1.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J2.5<\u002Fspan>Edge cases<\u002Fh3>\n  <ul>\n    <li>Chọn quán xong xoá khỏi wishlist trước khi quẹt — pool vẫn nên giữ trong 1h (intent là \"thèm ngay\" không phải \"lưu sau\").<\u002Fli>\n    <li>Hai user cùng quán nhưng mutual block — pool phải lọc 2 chiều.<\u002Fli>\n    <li>Quán đóng cửa — overlay \"đóng cửa\" + giờ mở; vẫn cho wishlist.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J2.6<\u002Fspan>Cân nhắc UX<\u002Fh3>\n  <ul>\n    <li>Status quip (<em class=\"vn\">\"Vừa tan làm, đang muốn ramen cay + bia lạnh. Có ai cùng?\"<\u002Fem>) mang nhiều tín hiệu freshness — hiển thị tuổi của nó (lý tưởng ≤30′) rõ hơn.<\u002Fli>\n    <li>\"+Wishlist\" và \"Tìm Mate\" là hai intent khác nhau, không nên nằm cạnh nhau mà thiếu copy \"ăn sau\" vs \"ăn nay\".<\u002Fli>\n    <li>\"Hợp gu Vy: 92%\" là so với <em>quán<\u002Fem>, không phải candidate — copy nên nói rõ.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J2.7<\u002Fspan>Cơ hội<\u002Fh3>\n  <ul>\n    <li>Hiện chip gu trùng trên thẻ Mate (\"Cả hai đều Cay 3 + Không hành\") — tăng tỷ lệ quẹt phải mà không phải kéo dài profile.<\u002Fli>\n    <li>Time-windowed swipe: thẻ Mate hết hạn 2h sau khi chọn quán. Throttling lành mạnh, buộc ra quyết định.<\u002Fli>\n    <li>Khi hover-trái do dự → mời \"Gửi Lá thư thay vì quẹt\" — chuyển kênh sang con đường chậm hơn.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- J3 -->\n<section id=\"j3\">\n  <h2><span class=\"secno\">J3<\u002Fspan>Vibe chat → unlock → đặt lịch First Date\n    <small>Match → 70% sôi → bắt tay trên lịch.<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Verified Mate (×2)<\u002Fspan>\n    <span class=\"chip\">Màn 14–17<\u002Fspan>\n    <span class=\"chip\">Phút → ngày<\u002Fspan>\n    <span class=\"chip wist\">Vibe-gated<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J3.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Tám đủ để xác nhận buổi ăn ngoài đời sẽ an toàn và vui, rồi đặt vào lịch chung.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Match (J2) hoặc Lá thư được accept (J4).<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Match đang hoạt động · còn trong cửa sổ 24h hello · cả hai không bị block.<\u002Ftd><\u002Ftr>\n    <tr><th>Validation / gate<\u002Fth><td>\n      <ul>\n        <li>Số điện thoại bị ẩn trong phòng chat — <em class=\"vn\">\"Phòng chat ẩn SĐT — vibe đủ chín, First Date sẽ mở\"<\u002Fem> (màn 15). Server phải regex-redact và warn.<\u002Fli>\n        <li>CTA First Date disabled tới khi Vibe ≥70 (so sánh màn 15 ↔ 16).<\u002Fli>\n        <li>Cả hai phải accept slot đề xuất thì booking mới commit.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>System response<\u002Fth><td>\n      <ul>\n        <li>Vibe meter cập nhật theo từng tin \"chất lượng\"; ticker chạy.<\u002Fli>\n        <li>Đạt 70 → chip lock đổi thành CTA \"Chốt First Date\" với micro-anim chúc mừng.<\u002Fli>\n        <li>Lịch hiện grid ngày + slot giờ; quán auto fill từ match gốc; có voucher \"50k vì chốt nhanh · áp dụng khi cả hai check-in đúng giờ\".<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Backend<\u002Fth><td><code>POST /messages<\u002Fcode>, <code>GET /matches/:id/vibe<\u002Fcode> (live hoặc WS), <code>POST /matches/:id/proposal<\u002Fcode>, <code>POST /matches/:id/proposal/accept<\u002Fcode>, <code>POST /bookings<\u002Fcode>, <code>GET /restaurants/:id/availability<\u002Fcode>.<\u002Ftd><\u002Ftr>\n    <tr><th>Business rule<\u002Fth><td>\n      <ul>\n        <li>Vibe lưu theo match — đóng / mở lại không reset.<\u002Fli>\n        <li>Sau 7 ngày không nhắn, archive room; Vibe đóng băng.<\u002Fli>\n        <li>Voucher chỉ kích hoạt khi cả hai check-in đúng giờ; lệch giờ một bên → void + Trust event.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n\n  <h3><span class=\"h3no\">J3.2<\u002Fspan>Bước chi tiết<\u002Fh3>\n  <ol class=\"steps\">\n    <li><span class=\"act\">Tap row chat ở inbox · mở phòng.<\u002Fspan><span class=\"sys\">Header có quán chung + trạng thái online. Vibe ring vẽ trên đỉnh, /100.<\u002Fspan><span class=\"scr\">màn 14 → 15<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Gửi tin, voice note (🎤), dùng chip (\"Topping tủ?\" \"Có order bia ko?\" \"Khung giờ tiện?\").<\u002Fspan><span class=\"sys\">Mỗi chip là gợi ý lệch \"blank-page anxiety\". Vibe tăng nhanh khi reply theo chip.<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Quan sát Vibe leo. Dưới 70: affordance \"Chốt First Date\" hiển thị locked + copy <em class=\"vn\">\"Chat thêm ~10 tin chất lượng nữa\"<\u002Fem>.<\u002Fspan><span class=\"sys\">Locked phải khác hẳn về thị giác — màn 15/16 đã làm tốt (chip Mint Cream locked vs chip berry CTA).<\u002Fspan><span class=\"scr\">màn 15 → 16<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Vibe ≥70 → hệ thống post card \"Đề xuất\": <em class=\"vn\">\"Đi luôn tối nay nha? · 19:30 · còn bàn 2 chỗ\"<\u002Fem>.<\u002Fspan><span class=\"sys\">Server check tồn slot live; nếu 4h tới không có → đề xuất 3 ngày kế.<\u002Fspan><span class=\"scr\">màn 16<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Tap \"Chốt First Date\" → bề mặt lịch.<\u002Fspan><span class=\"scr\">màn 17<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Chọn ngày (grid tháng 5/2026 · chip 7 ngày) + slot.<\u002Fspan><span class=\"sys\">Slot grey nếu hết bàn; banner \"Live Tracking sẽ bật 45 phút trước hẹn\" cảnh báo trước.<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Tap <em class=\"vn\">\"Chốt T7 · 19:30 →\"<\u002Fem>. Đối phương nhận prompt confirm/decline.<\u002Fspan><span class=\"sys\">Booking ở state <code>pending<\u002Fcode> cho tới khi đồng ý; quán giữ bàn soft-hold 15′.<\u002Fspan><\u002Fli>\n    <li><span class=\"act\">Đồng ý → booking <code>confirmed<\u002Fcode>. Tạo event trong Calendar máy với deep-link. Nhắc push T-24h và T-3h.<\u002Fspan><span class=\"sys\">Voucher 50k gắn (điều kiện). Job Live Tracking được schedule.<\u002Fspan><\u002Fli>\n  <\u002Fol>\n\n  <h3><span class=\"h3no\">J3.3<\u002Fspan>Lỗi<\u002Fh3>\n  <ul>\n    <li><strong>Tin chứa SĐT / Telegram / Zalo<\u002Fstrong> → auto-redact + warn nhẹ; lặp → tạm freeze Trust; lặp nhiều → đẩy moderation.<\u002Fli>\n    <li><strong>Đối phương im 48h<\u002Fstrong> → banner \"Mate đang im\"; chọn \"nhắc nhẹ\" (rate-limit) hoặc \"rời phòng\".<\u002Fli>\n    <li><strong>Quán đóng / hết slot<\u002Fstrong> → inline \"đổi quán?\"; cần đồng ý cả hai.<\u002Fli>\n    <li><strong>Booking bị decline<\u002Fstrong> → Vibe không reset; cooldown 1h trước khi đề xuất lại.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J3.4<\u002Fspan>Nhánh thay thế<\u002Fh3>\n  <ul>\n    <li>Quy tắc 24h hello (màn 14) có thể auto-archive match không có tin nào; copy cần nói rõ Vibe bắt đầu từ 0 hay từ sau tin đầu.<\u002Fli>\n    <li>Gold ×1.5 Vibe — multiplier nên hiển thị trên meter (ticker \"1.5×\") để minh bạch.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J3.5<\u002Fspan>Edge cases<\u002Fh3>\n  <ul>\n    <li>Mate bật \"ăn miết tạm nghỉ\" giữa Vibe — chat vẫn còn, không cho đề xuất mới.<\u002Fli>\n    <li>Lệch múi giờ (Mate đang du lịch) — lịch luôn neo theo giờ địa phương của quán + warn.<\u002Fli>\n    <li>Cả hai accept rồi một bên huỷ trong 30′ — Trust impact bất đối xứng; voucher void.<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J3.6<\u002Fspan>Cân nhắc UX<\u002Fh3>\n  <ul>\n    <li>Vibe meter là tính năng mạnh nhất và mờ nhất của sản phẩm. Cần một khoảnh khắc giáo dục một-lần khi vào phòng đầu tiên (\"Nồi lẩu sôi thế nào?\") — một tappable explainer là đủ.<\u002Fli>\n    <li>Affordance locked ở màn 15 đang nhẹ; lễ unlock ở màn 16 nên \"điện ảnh\" hơn (haptic + sound + confetti micro-anim). Hiện tại đọc như một badge tĩnh.<\u002Fli>\n    <li>Copy voucher <em class=\"vn\">\"Tặng voucher 50k vì chốt nhanh\"<\u002Fem> tốt cho motivation nhưng pha cash + Trust — điều kiện áp dụng phải <em>không thể bỏ sót<\u002Fem>, nếu không sẽ ngập ticket \"tôi không thấy voucher\".<\u002Fli>\n  <\u002Ful>\n\n  <h3><span class=\"h3no\">J3.7<\u002Fspan>Cơ hội<\u002Fh3>\n  <ul>\n    <li>Mở hai \"shortcut\" Vibe: gửi voice note (+vibe), gửi ảnh món yêu thích (+vibe). Tăng tỷ lệ tin chất lượng.<\u002Fli>\n    <li>Khi user mắc kẹt ở 65–69 trong 30′ → 1 nudge in-chat dựa trên tag chung (\"Cả hai đều mê bún chả — hỏi quán Đắc Kim đi?\").<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- J4 -->\n<section id=\"j4\">\n  <h2><span class=\"secno\">J4<\u002Fspan>Nhận lời mời qua \"Lá thư\"\n    <small>Đường tắt một chiều, không qua Vibe gate · hạn hồi âm 12h.<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Người nhận = Verified Mate<\u002Fspan>\n    <span class=\"chip\">Màn 18 · 19<\u002Fspan>\n    <span class=\"chip\">SLA 12h<\u002Fspan>\n    <span class=\"chip gold\">Khoảnh khắc duyên nhất<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J4.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>(Gửi) Bỏ qua ritual quẹt + tám, mời thẳng một Mate cụ thể đến một quán cụ thể. (Nhận) Quyết định có chấp nhận lời mời được \"addressed\" trực tiếp hay không.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Push: \"Có người gửi kèo cho Vy nè ✨\"<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Trust người gửi ≥ ngưỡng (giả định ≥80); chưa hết quota lá thư / tuần (giả định ≤3); người nhận profile public, không block; cả hai ≥18.<\u002Ftd><\u002Ftr>\n    <tr><th>Bước phía người nhận<\u002Fth><td>\n      <ol class=\"steps\">\n        <li><span class=\"act\">Nhận push \"Có người gửi kèo cho Vy nè\".<\u002Fspan><span class=\"sys\">Push mang theo Vibe-score-vs-receiver (78 ở màn 18). Tap → modal mở.<\u002Fspan><span class=\"scr\">màn 18<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Thấy thiệp niêm; tap \"Bóc thư xem ngay 💌\".<\u002Fspan><span class=\"sys\">Animation mở; reveal màn 19.<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Đọc thiệp: quán, ngày, giờ, chip vibe, mood line, P.S.<\u002Fspan><span class=\"scr\">màn 19<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Tap <em class=\"vn\">\"I said YES ✨\"<\u002Fem> hoặc <em class=\"vn\">\"Sorry Mate nhé — gấp lá thư lại 🙏\"<\u002Fem>.<\u002Fspan><span class=\"sys\">YES → booking auto-tạo (bypass Vibe gate); NO → tin hệ thống lịch sự gửi lại; hết hạn → đóng im lặng + thông báo người gửi.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Backend<\u002Fth><td><code>POST /letters<\u002Fcode> (gửi), <code>GET /letters/:id<\u002Fcode>, <code>POST /letters/:id/respond<\u002Fcode>. State machine: drafted → sent → opened → accepted | declined | expired.<\u002Ftd><\u002Ftr>\n    <tr><th>Business rule<\u002Fth><td>\n      <ul>\n        <li>Hạn 12h tính từ lúc <em>gửi<\u002Fem>, không phải lúc <em>mở<\u002Fem>. Countdown hiển thị <em class=\"vn\">\"⏱ CÒN 1N 4H\"<\u002Fem>.<\u002Fli>\n        <li>Lá thư bypass Vibe ≥70. Đây là cách duy nhất hợp lệ để chốt kèo mà không cần chat trước.<\u002Fli>\n        <li>Nếu accept, phòng chat tự tạo với Vibe khởi đầu ≈50 (giả định, thưởng cho tín hiệu tin tưởng).<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Validation<\u002Fth><td>Nội dung qua bộ lọc profanity + PII. \"59₫ POSTAGE\" là copy trang trí — xác nhận không thật sự thu phí. Ngày hẹn ≥2h tương lai; quán phải mở cửa.<\u002Ftd><\u002Ftr>\n    <tr><th>Lỗi / fallback<\u002Fth><td>\n      <ul>\n        <li>Thư hết hạn trước khi mở → state \"đã hết hạn\"; cho \"gửi lại\" có cooldown.<\u002Fli>\n        <li>Người gửi xoá tài khoản sau khi gửi → thư vẫn hiện, nhưng YES đổi thành \"Mate đã rời ĂnMates · không thể trả lời\".<\u002Fli>\n        <li>Người nhận tắt thông báo → fallback email ở T+6h nếu có email.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Edge cases<\u002Fth><td>Cùng người gửi → cùng người nhận trong 14 ngày = chặn (anti-spam); người nhận có thể \"mark all from sender as not interested\" một lần.<\u002Ftd><\u002Ftr>\n    <tr><th>Cân nhắc UX<\u002Fth><td>\n      <ul>\n        <li>Lá thư là điểm nhấn brand. Bề mặt <strong>soạn thư<\u002Fstrong> của người gửi <strong>chưa có trong bộ màn<\u002Fstrong> — xem F1. Ưu tiên P0.<\u002Fli>\n        <li>Thiết kế tem tĩnh có rủi ro bị đọc là \"email marketing\" — haptic + tiếng giấy mở (optional) bảo vệ tinh thần.<\u002Fli>\n        <li>\"Sorry Mate nhé\" phải rõ ràng là hành động low-stigma; Trust không bị ảnh hưởng khi decline.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Cơ hội<\u002Fth><td>\n      <ul>\n        <li>Cho người gửi gắn voice note ngắn (≤10s) — tăng conversion mà không làm mất duyên.<\u002Fli>\n        <li>Soạn 1 thư → gửi tối đa 3 ứng viên dưới dạng thư riêng có biến thể nhẹ. YES đầu thắng; còn lại decline lịch sự.<\u002Fli>\n        <li>Preset \"Lá thư từ Best Mate\" cho re-engagement (J8).<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- J5 -->\n<section id=\"j5\">\n  <h2><span class=\"secno\">J5<\u002Fspan>Ngày hẹn: Selfie xuất phát → Live Tracking → Auto check-in\n    <small>Booking confirmed → cả hai có mặt tại bàn.<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Hai Mate<\u002Fspan>\n    <span class=\"chip\">Màn 20 · 21<\u002Fspan>\n    <span class=\"chip\">T-45′ → T+10′<\u002Fspan>\n    <span class=\"chip ocean\">An toàn-critical<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J5.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Cả hai xuất phát đúng giờ, biết đối phương đang trên đường, và check-in ở quán không ma sát.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Scheduler job ở T-45′; geofence enter tại quán.<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Booking confirmed · vị trí when-using (best: background) · push enabled · đồng hồ đúng.<\u002Ftd><\u002Ftr>\n    <tr><th>Bước chi tiết<\u002Fth><td>\n      <ol class=\"steps\">\n        <li><span class=\"act\">Push: \"Lên đường với Khánh nào! Selfie một phát để Khánh biết bạn đang trên đường.\"<\u002Fspan><span class=\"sys\">Tap deep-link sang modal Selfie xuất phát (màn 20).<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Selfie có sticker, text, mood, chip giờ / vị trí / vibe, emoji.<\u002Fspan><span class=\"sys\">Không cần filter; ảnh chỉ ở trong match; không post public.<\u002Fspan><span class=\"scr\">màn 20<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Chọn <em class=\"vn\">\"Xác nhận đã bắt đầu đi 🛵\"<\u002Fem>, \"Báo Mate mình sẽ trễ\", hoặc \"Nhắc lại sau 5 phút\".<\u002Fspan><span class=\"sys\">\"Báo trễ\" hỏi mức (5/10/15+); đối phương nhận push.<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Selfie confirm → Live Tracking xuất hiện.<\u002Fspan><span class=\"sys\">ETA hai bên render trên tile (không nhất thiết bản đồ); update ~30s/lần.<\u002Fspan><span class=\"scr\">màn 21<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Geofence enter → auto check-in.<\u002Fspan><span class=\"sys\">+2 Trust nếu đúng giờ; check-in một bên bắt đầu timer \"chờ\"; hiển thị cho Mate.<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Cả hai checked-in → Live Tracking dismiss; chip \"đã đến nơi\" giữ ở header chat 2h.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Backend<\u002Fth><td><code>POST /bookings/:id/depart<\u002Fcode>, WS <code>/tracking/:bid<\u002Fcode>, <code>POST /bookings/:id/checkin<\u002Fcode>, <code>POST /bookings/:id/late<\u002Fcode>.<\u002Ftd><\u002Ftr>\n    <tr><th>Validation<\u002Fth><td>Selfie phải capture live (không upload từ library) và đạt liveness; \"Báo trễ\" chỉ hợp lệ trong window T-30 → T+0; \"Nhắc lại 5 phút\" tối đa 3 lần.<\u002Ftd><\u002Ftr>\n    <tr><th>Lỗi<\u002Fth><td>\n      <ul>\n        <li>Tắt vị trí → fallback nút \"Đã đến\" thủ công + đồng xác nhận của Mate; degrade graceful (không +Trust bonus).<\u002Fli>\n        <li>OS kill background tracking → resume khi quay foreground; banner \"tracking đang nghỉ\".<\u002Fli>\n        <li>Trễ &gt;15′ mà không \"Báo trễ\" → soft check: \"Bạn vẫn đang đến chứ?\"; im 10′ nữa → đánh dấu <code>no_show<\u002Fcode> cho bên đó.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Edge cases<\u002Fth><td>\n      <ul>\n        <li>Quán có nhiều chi nhánh trùng GPS — cần polygon chính xác, không phải bán kính.<\u002Fli>\n        <li>Hai Mate check-in cùng lúc ở cửa khác — debounce để hai event đều được tính.<\u002Fli>\n        <li>Đổi lịch ±15′ trong chat — job Live Tracking phải reschedule, không duplicate.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Notification<\u002Fth><td>T-24h nhắc · T-3h \"ăn miết check?\" · T-45 selfie nudge · push \"đối phương đang tới\" · proximity 320m · \"đã check-in\" · T+30 prompt review.<\u002Ftd><\u002Ftr>\n    <tr><th>Cân nhắc UX<\u002Fth><td>\n      <ul>\n        <li>Live Tracking được trình bày như card nhỏ (màn 21) thay vì map đầy đủ. Tốt — né tension riêng tư \"họ ở đường nào\". Giữ trừu tượng (ETA + status, không phải pin trên phố).<\u002Fli>\n        <li>\"+2 Trust\" nên hiện ngay trên Live Tracking khi thành công, không chỉ ở dashboard.<\u002Fli>\n        <li>Cho user share ETA với một người thứ ba (\"share with a friend for safety\") — củng cố narrative an toàn.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Cơ hội<\u002Fth><td>Surface \"đến đúng giờ streak\" như micro-badge profile — bồi đắp Trust mà không thổi số.<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- J6 -->\n<section id=\"j6\">\n  <h2><span class=\"secno\">J6<\u002Fspan>Đánh giá ẩn danh sau buổi ăn\n    <small>Hành vi → bút toán Trust.<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Cả hai<\u002Fspan>\n    <span class=\"chip\">Màn 22<\u002Fspan>\n    <span class=\"chip\">T+30′ → 48h<\u002Fspan>\n    <span class=\"chip ocean\">Reputation<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J6.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Đánh giá Mate (và tuỳ chọn: quán) trung thực với cam kết ẩn danh + lộ song song.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>T+30′ sau cái check-in muộn hơn trong hai check-in. Skip → re-prompt ở T+6h và T+24h, hết hạn T+48h.<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Booking <code>completed<\u002Fcode>. Cả hai đã check-in.<\u002Ftd><\u002Ftr>\n    <tr><th>Quy tắc<\u002Fth><td>\n      <ul>\n        <li>Review <strong>double-blind<\u002Fstrong> — chỉ lộ khi cả hai đã submit hoặc đến T+48h.<\u002Fli>\n        <li>Chip tap-multi (positive: dễ tám, đúng giờ, cùng vibe, sẵn ăn miết, sành ăn — cautious: hơi gượng).<\u002Fli>\n        <li>Freeform tối đa 280 ký tự.<\u002Fli>\n        <li>Review quán optional, <strong>+3 Trust<\u002Fstrong> nếu kèm hình/video.<\u002Fli>\n        <li>\"Báo cáo\" mở luồng safety, bypass public review và đi thẳng T&amp;S.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>System response<\u002Fth><td>\n      <ul>\n        <li>Submit → server tính delta Trust (asymmetric — chip positive thưởng; \"hơi gượng\" không phạt, chỉ suppress re-match).<\u002Fli>\n        <li>Rating quán góp vào điểm public.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Backend<\u002Fth><td><code>POST /bookings/:id/review<\u002Fcode>, <code>POST /reports<\u002Fcode>, <code>POST /trust/events<\u002Fcode> (server-issued).<\u002Ftd><\u002Ftr>\n    <tr><th>Lỗi / edge<\u002Fth><td>\n      <ul>\n        <li>Một bên skip → review của bên kia vẫn lộ sau 48h, tác động Trust một chiều nhưng trọng số giảm.<\u002Fli>\n        <li>User report trong lúc review → giữ state review; Mate chỉ thấy \"Mate skip review\", không biết bị report.<\u002Fli>\n        <li>Upload hình fail → vẫn submit được text-only; +3 chỉ áp khi hình lưu được.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Cân nhắc UX<\u002Fth><td>\n      <ul>\n        <li>Bảng chip hiện cân bằng (một chip mơ hồ giữa nhiều positive) — giữ như thế; thêm tiêu cực sẽ biến review thành công cụ kỷ luật.<\u002Fli>\n        <li>Hợp đồng \"lộ song song\" phải hiện rõ — đây là contract của cả hệ thống review.<\u002Fli>\n        <li>\"Báo cáo\" nên là link chữ nhỏ, không phải button — không trở thành default hung hăng.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Cơ hội<\u002Fth><td>Thêm outcome \"Best Mate suggestion\" non-Trust — nếu cả hai pick \"sẵn ăn miết\", surface CTA re-book vào sáng hôm sau.<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- J7 -->\n<section id=\"j7\">\n  <h2><span class=\"secno\">J7<\u002Fspan>Hồi phục Trust &amp; chuyển đổi IAP\n    <small>Sự kiện Trust &lt;80 → quyết định Plus / Gold / Ultimate.<\u002Fsmall>\n  <\u002Fh2>\n\n  <div class=\"chips\">\n    <span class=\"chip berry\">Vai trò · Free → Plus/Gold/Ultimate<\u002Fspan>\n    <span class=\"chip\">Màn 23–28<\u002Fspan>\n    <span class=\"chip\">Vài phút<\u002Fspan>\n    <span class=\"chip gold\">Monetisation<\u002Fspan>\n  <\u002Fdiv>\n\n  <h3><span class=\"h3no\">J7.1<\u002Fspan>Tổng quan<\u002Fh3>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Phục hồi sau khi Trust tụt (trễ, no-show, dispute) và/hoặc nâng cấp lên tier phù hợp.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Trust qua mốc 80 đi xuống · tap \"Quản lý → Gói ĂnMates\" ở tab Mình · nudge ngay sau khi miss check-in.<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Verified · có thể thêm payment (Apple/Google IAP).<\u002Ftd><\u002Ftr>\n    <tr><th>Bước chi tiết<\u002Fth><td>\n      <ol class=\"steps\">\n        <li><span class=\"act\">Đến màn 25 (overview 3 tier) với copy \"Trust Score đang ở [N] — boost ngay để không bị giới hạn\".<\u002Fspan><span class=\"sys\">Server inject Trust hiện tại vào hero copy; CTA \"khôi phục\" pre-select Gold (lựa chọn của 70%).<\u002Fspan><span class=\"scr\">màn 25<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Tap tier → màn chi tiết (Plus/Gold/Ultimate, màn 26/27/28).<\u002Fspan><span class=\"sys\">Mỗi màn có giá, \"Best for\", danh sách quyền lợi, toggle tháng/năm.<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Tap \"Chọn [TIER]\" → modal Apple/Google IAP.<\u002Fspan><span class=\"sys\">Success → server confirm entitlement; side-effect (Plus: +10 Trust Booster có sẵn; Gold: optional Instant Amnesty; Ultimate: Trust khoá 100).<\u002Fspan><\u002Fli>\n        <li><span class=\"act\">Quay về Mình; \"Gói ĂnMates · Đang dùng · [Tier]\" hiện kèm renewal.<\u002Fspan><span class=\"scr\">màn 23<\u002Fspan><\u002Fli>\n      <\u002Fol>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Backend<\u002Fth><td><code>POST /iap/receipt<\u002Fcode>, <code>POST /trust/booster/apply<\u002Fcode>, <code>POST /trust/amnesty/redeem<\u002Fcode>, <code>POST /entitlements<\u002Fcode>; webhook Apple/Google renewal.<\u002Ftd><\u002Ftr>\n    <tr><th>Validation<\u002Fth><td>Một subscription active tại mỗi thời điểm; downgrade chỉ có hiệu lực cuối kỳ; receipt validate server-side; restore cross-platform theo account ID, không phải store ID.<\u002Ftd><\u002Ftr>\n    <tr><th>Lỗi / fallback<\u002Fth><td>\n      <ul>\n        <li>Payment fail → giữ ở chi tiết tier với retry; không hứa quyền lợi tới khi receipt valid.<\u002Fli>\n        <li>Webhook entitlement chậm → UI optimistic ≤2′, toast reconcile.<\u002Fli>\n        <li>Refund qua Apple/Google → revert tier; nếu Trust được boost từ amnesty, rollback delta (không xuống dưới sàn tự nhiên).<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Business rule<\u002Fth><td>\n      <ul>\n        <li>Trust Booster (+10) one-shot/tháng, hết hạn nếu không dùng.<\u002Fli>\n        <li>Instant Amnesty reset 100 — một lần/chu kỳ Gold; không stack với Booster.<\u002Fli>\n        <li>Trust Freeze (Ultimate) khoá <em>hiện tại<\u002Fem>; không heal hồi tố.<\u002Fli>\n        <li>Golden Match Pool cần Trust ≥95 <strong>và<\u002Fstrong> Ultimate — Ultimate đơn thuần không đủ; copy phải nói rõ để tránh ticket \"tôi mua Ultimate mà không có Golden\".<\u002Fli>\n        <li>Cashback 100k/tháng cần 4 buổi ăn hoàn tất trong tháng (anti-fraud: phải là Mate khác nhau, không cùng một Mate ×4).<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Edge cases<\u002Fth><td>Lạm dụng trial · nhiều Apple ID · family-sharing subscription · regional pricing khi store ID đổi.<\u002Ftd><\u002Ftr>\n    <tr><th>Cân nhắc UX<\u002Fth><td>\n      <ul>\n        <li>Framing \"Cứu Kèo Học Đường\" cực hay — sinh viên được narrative giữ thể diện.<\u002Fli>\n        <li>Hiện microcopy \"gói không xoá hành vi xấu, chỉ giúp bạn quay lại pool\" — bảo vệ contract Trust.<\u002Fli>\n        <li>Ghost Tracking là privacy-charged; cần screen consent một-lần + cho người dùng khác opt-out khỏi \"bị xem\".<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Cơ hội<\u002Fth><td>\n      <ul>\n        <li>Surface con đường $0 self-repair (viết 2 review chi tiết → +6 Trust) cạnh IAP — tín hiệu công bằng nâng tin tưởng product.<\u002Fli>\n        <li>Ăn nhóm (≥3) là cơ hội tự nhiên để Plus tái-package giá trị mất đi từ việc bỏ giới hạn chat — vd Plus có \"tổ chức nhóm 4 chỗ\", Gold có \"6 chỗ\", Ultimate có \"8+\".<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- J8 -->\n<section id=\"j8\">\n  <h2><span class=\"secno\">J8<\u002Fspan>Best Mate re-engagement\n    <small>≥3 buổi ăn cùng một người → mời lại không cần ma sát.<\u002Fsmall>\n  <\u002Fh2>\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Mời lại nhanh một Mate đã ăn cùng nhiều lần, bỏ qua ritual quẹt.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>Rail \"BEST MATE\" ở màn 14 inbox; ≥3 buổi hoàn tất giữa hai user.<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Cả hai active · không bị block · không có dispute đang mở.<\u002Ftd><\u002Ftr>\n    <tr><th>Các bước<\u002Fth><td>\n      <ol>\n        <li>Từ rail inbox tap \"Rủ đi\" trên Hà / Quân / Thảo.<\u002Fli>\n        <li>Picker quán gọn (quán gần nhất prefilled · 3 alternatives dựa lịch sử gu chung).<\u002Fli>\n        <li>Picker giờ; submit ở dạng biến thể của Lá thư (hạn 8h — ngắn hơn vì tin tưởng đã có).<\u002Fli>\n        <li>Người nhận confirm → auto booking.<\u002Fli>\n      <\u002Fol>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>System note<\u002Fth><td>Vibe khởi đầu = 80 cho Best Mate (giả định); semantic \"First Date\" thay bằng \"Tiếp tục ăn miết\".<\u002Ftd><\u002Ftr>\n    <tr><th>Edge case<\u002Fth><td>Một bên ẩn profile → \"Rủ đi\" disabled với explainer nhẹ; vẫn chat được trong phòng archive.<\u002Ftd><\u002Ftr>\n    <tr><th>Cân nhắc UX<\u002Fth><td>\"Best Mate\" không nên trông như status quan hệ — giữ framing platonic-first (giọng brand đã làm rồi).<\u002Ftd><\u002Ftr>\n    <tr><th>Cơ hội<\u002Fth><td>Surface \"ăn miết review\" cuối năm — top 3 Mate, top 5 quán, tổng số kèo. Khoảnh khắc share organic mạnh.<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- J9 -->\n<section id=\"j9\">\n  <h2><span class=\"secno\">J9<\u002Fspan>Huỷ · no-show · tranh chấp\n    <small>Đường buồn — nhưng bảo vệ Trust economy.<\u002Fsmall>\n  <\u002Fh2>\n\n  <table class=\"j\">\n    <tbody><tr><th>Mục tiêu<\u002Fth><td>Huỷ hoặc báo cáo an toàn, không bị phạt nặng cho lý do hợp lý.<\u002Ftd><\u002Ftr>\n    <tr><th>Trigger<\u002Fth><td>\"Báo Mate mình sẽ trễ\" (màn 20); tap \"Báo cáo\" trên review (màn 22); huỷ thủ công ở header chat (chưa có màn).<\u002Ftd><\u002Ftr>\n    <tr><th>Tiền điều kiện<\u002Fth><td>Booking active hoặc completed gần đây (≤48h).<\u002Ftd><\u002Ftr>\n    <tr><th>Luồng chi tiết<\u002Fth><td>\n      <ol>\n        <li><strong>Huỷ ≥24h trước:<\u002Fstrong> không trừ Trust; voucher void; auto tin gửi Mate; release bàn.<\u002Fli>\n        <li><strong>Huỷ &lt;24h, &gt;2h:<\u002Fstrong> −3 Trust; Forgiveness Gold ăn được 1/tháng.<\u002Fli>\n        <li><strong>Huỷ &lt;2h:<\u002Fstrong> −5 Trust; chat soft-archive; voucher void.<\u002Fli>\n        <li><strong>No-show:<\u002Fstrong> tự phát hiện T+15′; −10 Trust; cooldown swipe 48h.<\u002Fli>\n        <li><strong>Báo cáo (an toàn):<\u002Fstrong> mở form (hành vi không phù hợp, ảnh giả, hăm doạ, lừa đảo, khác); upload bằng chứng; route T&amp;S; pause cả hai tài khoản trong review.<\u002Fli>\n      <\u002Fol>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Backend<\u002Fth><td><code>POST /bookings/:id/cancel<\u002Fcode>, <code>POST /bookings/:id/noshow<\u002Fcode>, <code>POST /reports<\u002Fcode>, <code>POST /trust/events<\u002Fcode>.<\u002Ftd><\u002Ftr>\n    <tr><th>System response<\u002Fth><td>\n      <ul>\n        <li>Tài khoản bị report → pause matching/chat; vẫn xem được profile mình; banner giải thích state.<\u002Fli>\n        <li>Resolved → reporter (tuỳ chọn) được báo \"đã xử lý\" mà không tiết lộ hành động cụ thể.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n    <tr><th>Validation<\u002Fth><td>Không report &gt;48h sau booking; không report nhân đôi cùng một incident; rate-limit report / reporter / tháng (anti-abuse).<\u002Ftd><\u002Ftr>\n    <tr><th>Lỗi<\u002Fth><td>Hai bên cùng report → T&amp;S xử concurrent và pause cả hai đến khi điều tra.<\u002Ftd><\u002Ftr>\n    <tr><th>Edge case<\u002Fth><td>No-show do quán giữ nhầm bàn → cả hai miễn trừ Trust; voucher refund.<\u002Ftd><\u002Ftr>\n    <tr><th>Notification<\u002Fth><td>\"Mate đã huỷ\" (kèm lý do chip), \"Mate đang trễ 10′\", \"Báo cáo của bạn đã được tiếp nhận\", \"Tình trạng tài khoản đang được xem xét\".<\u002Ftd><\u002Ftr>\n    <tr><th>Cân nhắc UX<\u002Fth><td>\n      <ul>\n        <li>Bề mặt appeal hiện chưa thấy — cần xây (xem F1).<\u002Fli>\n        <li>Penalty Trust phải reversible cho support mà không cần engineering — admin tool day-one.<\u002Fli>\n        <li>Preview phạt (\"Huỷ bây giờ sẽ trừ 5 điểm Trust\") <em>trước<\u002Fem> confirm, không phải sau.<\u002Fli>\n      <\u002Ful>\n    <\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- ============== Phần III · Findings ============== -->\n\n<!-- F1 -->\n<section id=\"f1\">\n  <h2><span class=\"secno\">F1<\u002Fspan>Luồng còn thiếu &amp; chưa rõ\n    <small>Hai mươi bảy lỗ hổng chặn việc đi vào production, xếp theo mức độ.<\u002Fsmall>\n  <\u002F
