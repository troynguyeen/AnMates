// ===== Helper: render pixel art from 2D array =====
function pixelSVG(grid, palette, size=24, bg=null, rounded=true) {
  let rects = '';
  for (let y = 0; y < grid.length; y++) {
    for (let x = 0; x < grid[y].length; x++) {
      const c = grid[y][x];
      if (c === 0 || c === '.') continue;
      const color = palette[c];
      if (!color) continue;
      rects += `<rect x="${x}" y="${y}" width="1" height="1" fill="${color}"/>`;
    }
  }
  const bgRect = bg ? `<rect width="${size}" height="${size}" fill="url(#bg)"/>` : '';
  const defs = bg ? `<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      ${bg.map((stop, i) => `<stop offset="${i/(bg.length-1)*100}%" stop-color="${stop}"/>`).join('')}
    </linearGradient></defs>` : '';
  const clipId = 'clip' + Math.random().toString(36).slice(2,8);
  const clip = rounded ? `<defs><clipPath id="${clipId}"><rect width="${size}" height="${size}" rx="4" ry="4"/></clipPath></defs>` : '';
  return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
    ${defs}${clip}
    <g ${rounded ? `clip-path="url(#${clipId})"` : ''}>
      ${bgRect}${rects}
    </g>
  </svg>`;
}
