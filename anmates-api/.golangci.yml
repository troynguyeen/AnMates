version: "2"

run:
  timeout: 3m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck       # unchecked errors (critical for DB + HTTP calls)
    - govet          # go vet checks
    - staticcheck    # SA* rules — most valuable static analysis suite
    - unused         # exported/unexported symbols never referenced
    - bodyclose      # HTTP response bodies not closed
    - noctx          # http.NewRequest without context
    - revive         # golint replacement — naming, exports, comments
    - gocritic       # 100+ style + correctness checks
    - misspell       # typos in comments and string literals
    - nolintlint     # validates //nolint: directives are accurate

  settings:
    errcheck:
      exclude-functions:
        - (*github.com/jackc/pgx/v5/pgxpool.Pool).Close
        - (*github.com/jackc/pgx/v5.Tx).Rollback
        - (net/http.Response.Body).Close  # defer resp.Body.Close() is legitimately fire-and-forget

    revive:
      rules:
        # Naming + correctness rules — high value, low noise.
        - name: var-naming
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unused-parameter
          severity: warning
        # exported doc comments: disabled — too noisy for a startup codebase.
        # Re-enable when the team adopts a doc-comment convention.

    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - paramTypeCombine

    staticcheck:
      checks:
        - "all"
        - "-SA1019"   # allow deprecated APIs
        - "-ST1000"   # package doc comment — too noisy, re-enable when adding godoc

issues:
  uniq-by-line: true

  exclusions:
    rules:
      # Advisory unlock in defer is intentionally fire-and-forget.
      - path: db/migrate\.go
        linters: [errcheck]
        text: "pg_advisory_unlock"

      # smoke/: do() helper reads+closes body internally; callers hold resp for
      # status code only. bodyclose can't see through the helper boundary.
      - path: smoke/
        linters: [bodyclose, noctx, errcheck]

      # interface{} in httputil is intentional (generic JSON envelope).
      - path: internal/httputil/
        linters: [revive]
        text: "interface\\{\\}"

  max-issues-per-linter: 0
  max-same-issues: 0
