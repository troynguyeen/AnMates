# Single-host stack for AnMates MVP.
# Total target footprint: ~200 MB (DB + API). Designed for 1 vCPU / 1 GB VPS.

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: anmates
    command: >
      postgres -c shared_buffers=64MB -c effective_cache_size=256MB
               -c work_mem=2MB -c max_connections=20
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anmates"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 120M

volumes:
  pgdata:
