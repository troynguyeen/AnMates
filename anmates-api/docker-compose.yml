# API-only quick start. For the full stack (FE + BE + DB) prefer the root
# docker-compose.yml (npm run dev). Both files read ../.env at repo root.

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    env_file: ../.env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 128M

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: anmates
    command: >
      postgres -c shared_buffers=64MB -c effective_cache_size=256MB
               -c work_mem=2MB -c max_connections=20
               -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anmates"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 120M

volumes:
  pgdata:
