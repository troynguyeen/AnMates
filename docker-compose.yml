# Full-stack dev environment for AnMates: Flutter web + Go API + Postgres.
# Reads ./env at repository root (see .env.example).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: anmates
    ports:
      - "5432:5432"
    command: >
      postgres -c shared_buffers=64MB -c effective_cache_size=256MB
               -c work_mem=2MB -c max_connections=20
               -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anmates"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./anmates-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    env_file: .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # --spider just probes the URL (no body download) — most reliable across
      # busybox/full wget builds.
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  flutter_web:
    build:
      context: ./anmates_flutter
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://127.0.0.1/:8080}
    restart: unless-stopped
    ports:
      - "0.0.0.0:${FLUTTER_WEB_PORT:-54180}:80"
    # nginx serves a static SPA — it doesn't talk to the API at startup, the
    # browser does. So we only wait for api to *start* (not be healthy);
    # otherwise a flaky api healthcheck blocks the web container forever.
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
