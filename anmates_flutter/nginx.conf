server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback so Flutter web routing works on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for hashed assets.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Don't cache the entry point — must always pick up new builds.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm image/svg+xml;
    gzip_min_length 1024;
}
