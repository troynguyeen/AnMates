<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="anmates">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>anmates</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Pre-load Firebase JS SDK and expose as globals so firebase_core_web
    skips its TrustedTypes-based script injection (window.firebase_core != null
    causes _initializeCore() to return early, using these module objects directly).
  -->
  <script type="module">
    import * as firebaseCore from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import * as firebaseAuth from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    window.firebase_core = firebaseCore;
    window.firebase_auth = firebaseAuth;
  </script>
</head>
<body>
  <!--
    reCAPTCHA container for Firebase Phone Auth on Web. The Firebase JS SDK
    attaches the v2 widget here; without it, grecaptcha hits a null DOM
    node and throws "Cannot read properties of null (reading 'style')".
  -->
  <div id="recaptcha-container" style="position:fixed;bottom:16px;right:16px;z-index:9999;"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
