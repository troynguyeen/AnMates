name: CD · Flutter Web → Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'anmates_flutter/**'
      - '.github/workflows/cd.flutter-web.yml'
  workflow_dispatch:

concurrency:
  group: cd.flutter-web-main
  cancel-in-progress: false

defaults:
  run:
    working-directory: anmates_flutter

jobs:
  deploy:
    name: Build + Deploy to live channel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    environment:
      name: production-web
      url: https://anmates-studio.web.app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: flutter test
        run: flutter test --reporter=expanded

      - name: flutter build web
        run: |
          flutter build web --release \
            --base-href / \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://anmates-api-492509819332.asia-southeast1.run.app' }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (live)
        run: |
          firebase deploy \
            --only hosting \
            --project anmates-studio \
            --non-interactive \
            --message "GH Actions: ${{ github.sha }}"

      - name: Smoke check live URL
        run: |
          set -e
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://anmates-studio.web.app)
            if [ "$status" = "200" ]; then
              echo "Live site responded 200"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 5s..."
            sleep 5
          done
          echo "::error::Live site did not return 200 after 5 attempts"
          exit 1
